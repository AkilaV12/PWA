<style>
/* ══ RAUL3 DESIGN TOKENS ══════════════════════════════════════════ */
:root{
  --rp:#0076CC; --rp-dk:#005FA3; --rp-black:#202737; --rp-orange:#F06000;
  --hi:#E5F4FF; --gl:#F7F8F9; --gll:#EBEDEE; --gm:#C6CCD0; --gd:#9BA3A7;
  --green:#118837; --green-lt:#E8F5ED;
  --red:#D01A1F;   --red-lt:#FDEEED;
  --yel:#D97706;   --yel-lt:#FFF8E1;
  --white:#FFFFFF;
  /* RAUL3 Chart Colors */
  --ch1:#3D94C0; --ch2:#2A5599; --ch3:#131C57;
  --ch4:#92B238; --ch5:#CB686A; --ch6:#F06000;
  --font:'Roboto',-apple-system,sans-serif;
  --sh:0 1px 3px rgba(0,0,0,.08); --sh2:0 2px 8px rgba(0,0,0,.12);
  --br:2px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%;overflow:hidden}
body{font-family:var(--font);background:var(--gl);color:var(--rp-black);font-size:14px;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--gm);border-radius:3px}

/* ══ APP SHELL ═══════════════════════════════════════════════════ */
.app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
.app-body{display:flex;flex:1;overflow:hidden;min-height:0}

/* ══ OMNIBAR ═════════════════════════════════════════════════════ */
.omnibar{height:56px;background:var(--rp-black);display:flex;align-items:center;padding:0 8px 0 12px;gap:0;flex-shrink:0;z-index:200}
.ob-hamburger{width:40px;height:40px;display:flex;align-items:center;justify-content:center;border-radius:var(--br);cursor:pointer;color:rgba(255,255,255,.65);transition:background .15s;flex-shrink:0}

.ob-logo{display:flex;align-items:center;gap:7px;padding:0 10px;text-decoration:none}
.ob-logo-mark{width:26px;height:26px;background:var(--rp);border-radius:3px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ob-logo-text{color:#fff;font-size:13px;font-weight:700;letter-spacing:-.01em;white-space:nowrap}
.ob-sep{width:1px;height:24px;background:rgba(255,255,255,.15);margin:0 4px;flex-shrink:0}
.ob-prop-picker{display:flex;align-items:center;gap:6px;padding:5px 10px;border-radius:var(--br);cursor:pointer;transition:background .15s;flex-shrink:0}
.ob-prop-picker:hover{background:rgba(255,255,255,.1)}
.ob-prop-name{color:#fff;font-size:12px;font-weight:500;white-space:nowrap}
.ob-prop-sub{color:rgba(255,255,255,.55);font-size:11px;white-space:nowrap}
.ob-search{flex:1;max-width:280px;margin:0 12px;position:relative;display:flex;align-items:center}
.ob-search-input{width:100%;height:30px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.15);border-radius:15px;padding:0 12px 0 30px;font-size:12px;font-family:var(--font);outline:none;color:#fff;transition:background .15s,border-color .15s}
.ob-search-input::placeholder{color:rgba(255,255,255,.45)}
.ob-search-input:focus{background:rgba(255,255,255,.18);border-color:rgba(255,255,255,.3)}
.ob-search-icon{position:absolute;left:9px;color:rgba(255,255,255,.45);pointer-events:none}
.ob-spacer{flex:1}
.ob-actions{display:flex;align-items:center;gap:1px}
.ob-icon-btn{width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:var(--br);cursor:pointer;color:rgba(255,255,255,.65);transition:background .15s,color .15s;position:relative;flex-shrink:0}
.ob-icon-btn:hover{background:rgba(255,255,255,.1);color:#fff}
.ob-notif-dot{position:absolute;top:7px;right:7px;width:6px;height:6px;background:var(--red);border-radius:50%;border:1.5px solid var(--rp-black)}
.ob-user{display:flex;align-items:center;gap:7px;padding:5px 8px;border-radius:var(--br);cursor:pointer;transition:background .15s;margin-left:4px}
.ob-user:hover{background:rgba(255,255,255,.1)}
.ob-user-name{color:#fff;font-size:12px;font-weight:500;white-space:nowrap}
.ob-user-role{color:rgba(255,255,255,.45);font-size:10px;white-space:nowrap}
.ob-avatar{width:30px;height:30px;background:var(--rp);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:700;flex-shrink:0}
.lumina-btn{display:flex;align-items:center;gap:6px;padding:0 13px;height:30px;background:linear-gradient(135deg,#0052A5,#5B21B6);color:#fff;border:none;border-radius:15px;font-size:12px;font-weight:500;font-family:var(--font);cursor:pointer;margin-left:8px;transition:opacity .15s;white-space:nowrap;flex-shrink:0}
.lumina-btn:hover{opacity:.9}
.lumina-btn-dot{width:7px;height:7px;background:#4ade80;border-radius:50%;animation:lp 2s infinite}
@keyframes lp{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.7;transform:scale(1.2)}}

/* ══ SIDE NAV ════════════════════════════════════════════════════ */
.sidenav{width:240px;min-width:240px;background:#fff;border-right:1px solid var(--gll);display:flex;flex-direction:column;overflow:hidden;transition:width .2s,min-width .2s}
.sidenav.collapsed{width:48px;min-width:48px}
.sn-section{padding:14px 16px 4px;font-size:10px;font-weight:700;color:var(--gd);text-transform:uppercase;letter-spacing:.08em;white-space:nowrap;overflow:hidden;border-top:1px solid var(--gll);margin-top:4px}
.sn-section:first-child{border-top:none;margin-top:0}
.nav-item{display:flex;align-items:center;gap:10px;padding:0 15px;height:44px;cursor:pointer;color:var(--rp-black);border-bottom:1px solid var(--gll);transition:background .1s;position:relative;overflow:hidden;flex-shrink:0}
.nav-item:hover{background:var(--gl)}
.nav-item.active{background:var(--hi);color:var(--rp)}
.nav-item.active::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--rp)}
.nav-item-label{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.nav-badge{background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:1px 5px;border-radius:8px;flex-shrink:0}
.sn-footer{margin-top:auto;border-top:1px solid var(--gll)}
.sn-user{display:flex;align-items:center;gap:9px;padding:10px 14px;cursor:pointer;transition:background .1s;overflow:hidden}
.sn-user:hover{background:var(--gl)}
.sn-user-name{font-size:13px;font-weight:500;color:var(--rp-black);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sn-user-role{font-size:11px;color:var(--gd);white-space:nowrap}

/* ══ MAIN CONTENT ════════════════════════════════════════════════ */
.main-wrap{flex:1;display:flex;overflow:hidden;min-width:0}
.content{flex:1;overflow-y:auto;padding:20px 24px}

/* ══ PAGE HEADER ══════════════════════════════════════════════════*/
.ph-row{display:flex;align-items:flex-start;gap:12px;margin-bottom:18px}
.ph-title{font-size:20px;font-weight:700;color:var(--rp-black);margin-bottom:3px}
.ph-sub{font-size:12px;color:var(--gd)}
.ph-actions{margin-left:auto;display:flex;align-items:center;gap:8px;flex-shrink:0}

/* ══ CARDS ════════════════════════════════════════════════════════ */
.card{background:#fff;border:1px solid var(--gll);border-radius:var(--br);box-shadow:var(--sh)}
.card-hdr{padding:11px 16px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--gll)}
.card-title{font-size:13px;font-weight:500;color:var(--rp-black)}
.card-actions{margin-left:auto;display:flex;gap:6px}
.card-body{padding:16px}

/* ══ KPI CARDS ════════════════════════════════════════════════════ */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
.kpi-card{background:#fff;border:1px solid var(--gll);border-radius:var(--br);padding:16px;cursor:pointer;transition:box-shadow .15s,border-color .15s}
.kpi-card:hover{box-shadow:var(--sh2);border-color:var(--gm)}
.kpi-lbl{font-size:10px;font-weight:700;color:var(--gd);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;display:flex;align-items:center;gap:5px}
.kpi-val{font-size:26px;font-weight:700;color:var(--rp-black);line-height:1;margin-bottom:6px}
.kpi-val.blue{color:var(--rp)} .kpi-val.red{color:var(--red)} .kpi-val.green{color:var(--green)} .kpi-val.yellow{color:var(--yel)}
.kpi-delta{display:flex;align-items:center;gap:4px;font-size:12px;font-weight:500}
.kpi-delta.up{color:var(--red)} .kpi-delta.down{color:var(--green)} .kpi-delta.neutral{color:var(--gd)}

/* ══ CHIPS ════════════════════════════════════════════════════════ */
.chip{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:2px;font-size:11px;font-weight:500;white-space:nowrap}
.chip.red{background:var(--red-lt);color:var(--red)}
.chip.green{background:var(--green-lt);color:var(--green)}
.chip.yellow{background:var(--yel-lt);color:var(--yel)}
.chip.blue{background:var(--hi);color:var(--rp)}
.chip.gray{background:var(--gl);color:var(--gd);border:1px solid var(--gll)}
.chip.orange{background:#FFF3E8;color:var(--rp-orange)}

/* ══ PROGRESS ════════════════════════════════════════════════════ */
.pbar{background:var(--gll);border-radius:1px;overflow:hidden}
.pbar-fill{height:100%;border-radius:1px;transition:width .4s}
.pbar-fill.green{background:var(--green)} .pbar-fill.yellow{background:var(--yel)} .pbar-fill.red{background:var(--red)} .pbar-fill.blue{background:var(--rp)}

/* ══ TABLE ════════════════════════════════════════════════════════ */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
thead tr{border-bottom:2px solid var(--gll)}
th{padding:8px 12px;text-align:left;font-size:10px;font-weight:700;color:var(--gd);text-transform:uppercase;letter-spacing:.06em;white-space:nowrap}
td{padding:10px 12px;border-bottom:1px solid var(--gl);font-size:13px;color:var(--rp-black)}
tr:last-child td{border-bottom:none}
tbody tr{cursor:pointer;transition:background .1s}
tbody tr:hover{background:var(--gl)}

/* ══ BUTTONS ══════════════════════════════════════════════════════ */
.btn{display:inline-flex;align-items:center;gap:5px;padding:0 12px;height:30px;border-radius:var(--br);font-size:12px;font-weight:500;font-family:var(--font);cursor:pointer;border:none;transition:all .15s;white-space:nowrap}
.btn-primary{background:var(--rp);color:#fff}.btn-primary:hover{background:var(--rp-dk)}
.btn-secondary{background:#fff;color:var(--rp-black);border:1px solid var(--gm)}.btn-secondary:hover{background:var(--gl)}
.btn-ghost{background:transparent;color:var(--rp)}.btn-ghost:hover{background:var(--hi)}
.btn-success{background:var(--green);color:#fff}.btn-success:hover{opacity:.9}
.btn-danger{background:var(--red);color:#fff}.btn-danger:hover{opacity:.9}
.btn-sm{height:26px;padding:0 8px;font-size:11px}

/* ══ TABS ═════════════════════════════════════════════════════════ */
.tab-bar{display:flex;border-bottom:2px solid var(--gll);margin-bottom:16px}
.tab{padding:8px 16px;font-size:13px;font-weight:500;color:var(--gd);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:color .15s,border-color .15s;white-space:nowrap}
.tab:hover{color:var(--rp-black)} .tab.active{color:var(--rp);border-bottom-color:var(--rp);font-weight:700}

/* ══ INSIGHT STRIP ════════════════════════════════════════════════ */
.insight-strip{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.ins-pill{display:flex;align-items:center;gap:6px;padding:6px 11px;background:#fff;border:1px solid var(--gll);border-radius:var(--br);font-size:12px;color:var(--rp-black);cursor:pointer;white-space:nowrap;transition:border-color .15s}
.ins-pill:hover{border-color:var(--rp);color:var(--rp)}
.ins-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* ══ GRIDS ════════════════════════════════════════════════════════ */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.g6040{display:grid;grid-template-columns:3fr 2fr;gap:12px}

/* ══ PROP CARDS ══════════════════════════════════════════════════ */
.prop-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.prop-card{background:#fff;border:1px solid var(--gll);border-radius:var(--br);padding:16px;cursor:pointer;transition:box-shadow .15s,border-color .15s;box-shadow:var(--sh)}
.prop-card:hover{box-shadow:var(--sh2);border-color:var(--gm)}
.prop-card.over{border-top:3px solid var(--red)} .prop-card.warn{border-top:3px solid var(--yel)} .prop-card.ok{border-top:3px solid var(--green)}

/* ══ ALERTS ══════════════════════════════════════════════════════ */
.alert-item{display:flex;gap:12px;padding:14px 16px;background:#fff;border:1px solid var(--gll);border-radius:var(--br);cursor:pointer;transition:box-shadow .15s;margin-bottom:8px}
.alert-item:hover{box-shadow:var(--sh2)}
.alert-item.critical{border-left:3px solid var(--red)} .alert-item.warning{border-left:3px solid var(--yel)} .alert-item.info{border-left:3px solid var(--rp)}
.alert-icon-box{width:34px;height:34px;border-radius:var(--br);display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* ══ APPROVALS ════════════════════════════════════════════════════ */
.appr-item{display:flex;align-items:center;gap:12px;padding:11px 16px;border-bottom:1px solid var(--gl);transition:background .1s}
.appr-item:hover{background:var(--gl)} .appr-item:last-child{border-bottom:none}

.lp-title{font-size:13px;font-weight:500;color:#fff}
.lp-sub{font-size:10px;color:rgba(255,255,255,.45)}
.lp-close{margin-left:auto;cursor:pointer;color:rgba(255,255,255,.4);transition:color .15s}

.lp-body{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:8px;background:var(--gl)}
.lp-footer{padding:10px 12px;border-top:1px solid var(--gll);background:#fff;flex-shrink:0}
.lp-chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px}
.lp-chip{padding:4px 9px;background:var(--hi);border:1px solid #B3D7F0;border-radius:var(--br);font-size:11px;font-weight:500;color:var(--rp);cursor:pointer;transition:background .15s;white-space:nowrap}

.lp-input-row{display:flex;gap:6px;align-items:flex-end}
.lp-input{flex:1;border:1px solid var(--gm);border-radius:var(--br);padding:7px 10px;font-size:12px;font-family:var(--font);resize:none;outline:none;color:var(--rp-black);min-height:34px;max-height:90px;transition:border-color .15s}
.lp-input:focus{border-color:var(--rp)}
.lp-send{width:34px;height:34px;background:var(--rp);border:none;border-radius:var(--br);display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;flex-shrink:0;transition:background .15s}
.lp-send:hover{background:var(--rp-dk)} .lp-send:disabled{background:var(--gm);cursor:not-allowed}
.ai-msg{display:flex;flex-direction:column;gap:3px}
.ai-msg.user{align-items:flex-end} .ai-msg.bot{align-items:flex-start}

.ai-typing{display:flex;gap:4px;padding:8px 11px;background:#fff;border:1px solid var(--gll);border-radius:8px 8px 8px 2px;width:fit-content}
.ai-dot{width:6px;height:6px;background:var(--gm);border-radius:50%;animation:ab .8s infinite}
.ai-dot:nth-child(2){animation-delay:.15s} .ai-dot:nth-child(3){animation-delay:.3s}
@keyframes ab{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-5px)}}

/* selects */
select,input[type=text]{border:1px solid var(--gm);border-radius:var(--br);padding:4px 8px;font-size:12px;font-family:var(--font);color:var(--rp-black);background:#fff;outline:none}

.srch-wrap svg{position:absolute;left:8px;color:var(--gd);pointer-events:none}
.srch-inp{padding-left:28px;width:200px}
</style>

const LineChart=({data,w=480,h=150})=>{
  const pad={t:10,r:8,b:26,l:48};
  const cw=w-pad.l-pad.r, ch=h-pad.t-pad.b;
  const vals=data.flatMap(d=>[d.a,d.b]);
  const mn=Math.min(...vals)*.93, mx=Math.max(...vals)*1.05;
  const sx=(i)=>(i/(data.length-1))*cw+pad.l;
  const sy=(v)=>ch-((v-mn)/(mx-mn))*ch+pad.t;
  const bPath=data.map((d,i)=>`${i===0?'M':'L'}${sx(i)},${sy(d.b)}`).join(' ');
  const aPath=data.map((d,i)=>`${i===0?'M':'L'}${sx(i)},${sy(d.a)}`).join(' ');
  const area=data.map((d,i)=>`${i===0?'M':'L'}${sx(i)},${sy(d.a)}`).join(' ')+` L${sx(data.length-1)},${sy(mn)} L${pad.l},${sy(mn)} Z`;
  const yTicks=3;
  return(
    <svg width="100%" viewBox={`0 0 ${w} ${h}`} style={{overflow:'visible'}}>
      <defs><linearGradient id="ag" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#0076CC" stopOpacity=".15"/><stop offset="100%" stopColor="#0076CC" stopOpacity="0"/></linearGradient></defs>
      {[0,1,2].map(i=>{
        const v=mn+(mx-mn)*(i/2);
        const y=sy(v);
        return <g key={i}><line x1={pad.l} x2={pad.l+cw} y1={y} y2={y} stroke="#EBEDEE" strokeWidth="1"/><text x={pad.l-5} y={y+4} fill="#9BA3A7" fontSize="10" textAnchor="end">{K(v*1000)}</text></g>;
      })}
      {data.map((d,i)=><text key={i} x={sx(i)} y={h-4} fill="#9BA3A7" fontSize="10" textAnchor="middle">{d.m}</text>)}
      <path d={area} fill="url(#ag)"/>
      <path d={bPath} fill="none" stroke="#EBEDEE" strokeWidth="1.5" strokeDasharray="4 3"/>
      <path d={aPath} fill="none" stroke="#0076CC" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
      {data.map((d,i)=>i===data.length-1&&<circle key={i} cx={sx(i)} cy={sy(d.a)} r="4" fill="#0076CC" stroke="#fff" strokeWidth="2"/>)}
    </svg>
  );
};

const Donut=({data,size=130})=>{
  const cx=size/2,cy=size/2,r=(size/2)-14,stroke=18;
  const circ=2*Math.PI*r;
  const total=data.reduce((s,d)=>s+d.v,0);
  const COLS=['#0076CC','#3D94C0','#118837','#D97706','#5B21B6','#059669'];
  let off=0;
  const segs=data.map((d,i)=>{
    const p=d.v/total,dash=p*circ;
    const s={...d,dash,off,col:COLS[i%COLS.length]};
    off+=dash; return s;
  });
  return(
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{transform:'rotate(-90deg)'}}>
      {segs.map((s,i)=><circle key={i} cx={cx} cy={cy} r={r} fill="none" stroke={s.col} strokeWidth={stroke} strokeDasharray={`${s.dash} ${circ-s.dash}`} strokeDashoffset={-s.off}/>)}
    </svg>
  );
};

const Spark=({vals,col='#0076CC',h=28,w=80})=>{
  if(!vals||vals.length<2)return null;
  const mn=Math.min(...vals),mx=Math.max(...vals),rng=mx-mn||1;
  const pts=vals.map((v,i)=>`${(i/(vals.length-1))*w},${h-((v-mn)/rng)*(h-4)-2}`).join(' ');
  return<svg width={w} height={h} style={{overflow:'visible'}}><polyline points={pts} fill="none" stroke={col} strokeWidth="1.5" strokeLinejoin="round"/><circle cx={w} cy={h-((vals[vals.length-1]-mn)/rng)*(h-4)-2} r="2.5" fill={col}/></svg>;
};

const PBar=({val,max,h=6})=>{
  const p=Math.min((val/max)*100,100),c=bCol(Math.round(p));
  return<div className="pbar" style={{height:h}}><div className={`pbar-fill ${c==='yellow'?'yellow':c}`} style={{width:`${p}%`}}/></div>;
};

              </div>
            </div>
            <div style={{fontWeight:800,fontSize:16,color:'var(--rp-black)',minWidth:80,textAlign:'right'}}>{F(inv.amt)}</div>
            <Chip v={inv.status==='approved'?'green':inv.status==='rejected'?'red':inv.status==='review'?'yellow':'blue'}>{inv.status}</Chip>
            <div style={{display:'flex',gap:6,flexShrink:0}}>
              {(inv.status==='pending'||inv.status==='review')&&<>
                <Btn v="danger" sm onClick={()=>reject(inv.id)}><I n="x" s={10}/> Reject</Btn>
                <Btn v="success" sm onClick={()=>approve(inv.id)}><I n="check" s={10}/> Approve</Btn>
              </>}
              {inv.status==='approved'&&<span style={{fontSize:12,color:'var(--green)',fontWeight:600}}>✓ Approved</span>}
              {inv.status==='rejected'&&<span style={{fontSize:12,color:'var(--red)',fontWeight:600}}>✗ Rejected</span>}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
};

/* ══════════════════════════════════════════════════════
   OMNIBAR COMPONENT
══════════════════════════════════════════════════════ */
const Omnibar=({aiOpen,onToggleAI,onToggleSN})=>(
  <div className="omnibar">
    <div className="ob-hamburger" onClick={onToggleSN}><I n="menu" s={18}/></div>
    <div className="ob-logo">
      <div className="ob-logo-mark">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
          <path d="M12 2L2 7l10 5 10-5-10-5z" fill="#fff" opacity=".95"/>
          <path d="M2 17l10 5 10-5" stroke="#fff" strokeWidth="2" fill="none" opacity=".65"/>
          <path d="M2 12l10 5 10-5" stroke="#fff" strokeWidth="2" fill="none" opacity=".85"/>
        </svg>
      </div>
      <span className="ob-logo-text">OPSBUYER</span>
    </div>
    <div className="ob-sep"/>
    <div className="ob-prop-picker">
      <div>
        <div className="ob-prop-name">Pegasus Portfolio</div>
        <div className="ob-prop-sub">6 Properties · Texas</div>
      </div>
      <I n="chevron_down" s={13} c="rgba(255,255,255,.5)"/>
    </div>
    <div className="ob-search">
      <div className="ob-search-icon"><I n="search" s={13}/></div>
      <input className="ob-search-input" type="text" placeholder="Search vendors, invoices, properties…"/>
    </div>
    <div className="ob-spacer"/>
    <div className="ob-actions">
      <div className="ob-icon-btn" title="Cart"><I n="cart" s={16}/></div>
      <div className="ob-icon-btn" title="App Switcher"><I n="grid" s={16}/></div>
      <div className="ob-icon-btn" title="Notifications" style={{position:'relative'}}>
        <I n="bell" s={16}/>
        <span className="ob-notif-dot"/>
      </div>
      <div className="ob-icon-btn" title="Help"><I n="help" s={16}/></div>
    </div>
    <div className="ob-sep"/>
    <div className="ob-user">
      <div style={{textAlign:'right'}}>
        <div className="ob-user-name">Akila V.</div>
        <div className="ob-user-role">VP Procurement</div>
      </div>
      <div className="ob-avatar">AV</div>
    </div>
    <button className="lumina-btn" onClick={onToggleAI}>
      <span className="lumina-btn-dot"/>
      {aiOpen?'Hide Lumina':'Ask Lumina AI'}
    </button>
  </div>
);

/* ══════════════════════════════════════════════════════
   SIDE NAV COMPONENT
══════════════════════════════════════════════════════ */
const SideNav=({page,onNav,collapsed})=>{
  const alertCt=ALERTS.filter(a=>a.sev==='critical').length;
  const pendCt=INVS.filter(i=>i.status==='pending').length;
  const navItems=[
    {id:'dashboard',l:'Dashboard',       icon:'dashboard'},
    {id:'budget',   l:'Budget Monitor',  icon:'budget'},
    {id:'properties',l:'Property Spend', icon:'building'},
    {id:'alerts',   l:'Alerts',          icon:'alert',  badge:alertCt},
    {id:'approvals',l:'Approvals',       icon:'invoice',badge:pendCt},
  ];
  return(
    <div className={`sidenav${collapsed?' collapsed':''}`}>
      {!collapsed&&<div className="sn-section">Spend AI Agent</div>}
      {navItems.map(item=>(
        <div key={item.id} className={`nav-item${page===item.id?' active':''}`} onClick={()=>onNav(item.id)} title={collapsed?item.l:''}>
          <I n={item.icon} s={16} c={page===item.id?'var(--rp)':'var(--rp-black)'}/>
          {!collapsed&&<span className="nav-item-label">{item.l}</span>}
          {!collapsed&&item.badge>0&&<span className="nav-badge">{item.badge}</span>}
        </div>
      ))}
      {!collapsed&&<div className="sn-section">OPSBUYER</div>}
      {[{l:'Purchase Orders',icon:'invoice'},{l:'Vendor Management',icon:'building'},{l:'Contracts',icon:'filter'}].map((item,i)=>(
        <div key={i} className="nav-item" title={collapsed?item.l:''} style={{opacity:.5}}>
          <I n={item.icon} s={16}/>{!collapsed&&<span className="nav-item-label">{item.l}</span>}
        </div>
      ))}
      <div className="sn-footer">
        <div className="nav-item" style={{borderBottom:'none'}} title={collapsed?'Settings':''}>
          <I n="settings" s={16}/>{!collapsed&&<span className="nav-item-label">Settings</span>}
        </div>
        {!collapsed&&(
          <div className="sn-user">
            <div style={{width:28,height:28,borderRadius:'50%',background:'var(--rp)',display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:11,fontWeight:700,flexShrink:0}}>AV</div>
            <div style={{overflow:'hidden',flex:1}}>
              <div className="sn-user-name">Akila Viswanathan</div>
              <div className="sn-user-role">VP Procurement · Pegasus</div>
            </div>
            <I n="logout" s={13} c="var(--gd)"/>
          </div>
        )}
      </div>
    </div>
  );
};

/* ══════════════════════════════════════════════════════
   APP ROOT
══════════════════════════════════════════════════════ */
const PAGES={dashboard:<Dashboard onNav={()=>{}}/>,budget:<BudgetMonitor/>,properties:<PropertySpend/>,alerts:<AlertsPage/>,approvals:<ApprovalsPage/>};

const App=()=>{
  const [page,setPage]=useState('dashboard');
  const [aiOpen,setAiOpen]=useState(true);
  const [snCollapsed,setSnCollapsed]=useState(false);

  const pageEl=React.useMemo(()=>{
    const map={
      dashboard:<Dashboard onNav={setPage}/>,
      budget:<BudgetMonitor/>,
      properties:<PropertySpend/>,
      alerts:<AlertsPage/>,
      approvals:<ApprovalsPage/>,
    };
    return map[page]||map.dashboard;
  },[page]);

  return(
    <div className="app">
      <Omnibar aiOpen={aiOpen} onToggleAI={()=>setAiOpen(o=>!o)} onToggleSN={()=>setSnCollapsed(c=>!c)}/>
      <div className="app-body">
        <SideNav page={page} onNav={setPage} collapsed={snCollapsed}/>
        <div className="main-wrap">
          <div className="content">{pageEl}</div>
        </div>
        <LuminaPanel open={aiOpen} onClose={()=>setAiOpen(false)}/>
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
