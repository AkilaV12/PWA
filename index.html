<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Spend Compliance Agent — OPSBUYER | RealPage</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{--rp:#0076CC;--rp-dk:#005FA3;--rp-black:#202737;--hi:#E5F4FF;--gl:#F7F8F9;--gll:#EBEDEE;--gm:#C6CCD0;--gd:#9BA3A7;--green:#118837;--gbg:rgba(17,136,55,0.1);--red:#D01A1F;--rbg:rgba(208,26,31,0.1);--orange:#F06000;--yel:#D97706;--ybg:rgba(240,96,0,0.1);--pur:#7C3AED;--pbg:rgba(124,58,237,0.1);--font:'Roboto',-apple-system,sans-serif;--shadow:0px 6px 8px 0px rgba(32,39,55,0.04);--br:4px;--ch1:#B9E6EC;--ch2:#77C6D0;--ch3:#3D94C0;--ch4:#2A5599;--ch5:#131C57}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--gl);color:var(--rp-black);font-size:14px;line-height:1.4}
/* RAUL Omnibar */
.omnibar{height:56px;background:var(--rp-black);display:flex;align-items:center;padding:0 16px;gap:12px;position:fixed;top:0;left:0;right:0;z-index:100}
.ob-ham{color:#fff;cursor:pointer;display:flex;align-items:center;padding:4px;border-radius:4px;flex-shrink:0}.ob-ham:hover{background:rgba(255,255,255,.1)}
.ob-dots{display:flex;gap:3px;flex-shrink:0}
.ob-dots span{width:8px;height:8px;border-radius:50%;display:block}
.ob-dots span:nth-child(1),.ob-dots span:nth-child(2){background:var(--orange)}
.ob-dots span:nth-child(3){background:var(--rp)}
.ob-brand{display:flex;flex-direction:column;flex-shrink:0}
.ob-brand-name{color:#fff;font-size:14px;font-weight:700;line-height:18px;letter-spacing:.3px}
.ob-brand-ctx{color:rgba(255,255,255,.55);font-size:12px;line-height:14px}
.ob-search{flex:1;max-width:340px;margin:0 auto;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:4px;padding:7px 14px;display:flex;align-items:center;gap:8px}
.ob-search input{background:transparent;border:none;outline:none;color:#fff;font-size:14px;width:100%;font-family:var(--font)}
.ob-search input::placeholder{color:rgba(255,255,255,.35)}
.ob-acts{display:flex;align-items:center;gap:2px;flex-shrink:0}
.ob-ib{width:32px;height:32px;border-radius:50%;background:transparent;border:none;color:rgba(255,255,255,.7);cursor:pointer;display:flex;align-items:center;justify-content:center;position:relative;transition:background .15s;flex-shrink:0}
.ob-ib:hover{background:rgba(255,255,255,.1)}
.ob-dot{position:absolute;top:4px;right:4px;width:8px;height:8px;background:var(--orange);border-radius:50%;border:1.5px solid var(--rp-black)}
.ob-user{display:flex;align-items:center;gap:8px;flex-shrink:0}
.ob-user-info{display:flex;flex-direction:column;text-align:right}
.ob-user-name{color:#fff;font-size:12px;font-weight:500;line-height:14px}
.ob-user-role{color:rgba(255,255,255,.55);font-size:10px;line-height:12px}
.ob-av{width:28px;height:28px;border-radius:50%;background:var(--rp);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0}
.lumina-btn{background:linear-gradient(135deg,#6366F1,#8B5CF6);color:#fff;border:none;border-radius:4px;padding:7px 14px;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;font-family:var(--font);white-space:nowrap;transition:all .15s;flex-shrink:0}
.lumina-btn:hover{background:linear-gradient(135deg,#4F46E5,#7C3AED)}
.lumina-btn.active{box-shadow:0 0 0 2px rgba(99,102,241,.7),0 0 12px rgba(99,102,241,.4)}
.app-shell{display:flex;margin-top:56px;height:calc(100vh - 56px)}
/* RAUL SideNav */
.sidenav{width:240px;min-width:240px;background:#fff;border-right:1px solid var(--gll);display:flex;flex-direction:column;overflow-y:auto;transition:width .2s}
.sidenav.col{width:52px;min-width:52px}
.sidenav.col .sn-sect,.sidenav.col .nav-item span,.sidenav.col .nav-chev{display:none}
.nav-item{display:flex;align-items:center;gap:12px;padding:0 16px;height:46px;cursor:pointer;color:var(--rp-black);font-size:14px;font-weight:400;position:relative;transition:background .1s;user-select:none}
.nav-item:hover{background:var(--gl)}
.nav-item.active{background:var(--hi);color:var(--rp);font-weight:500}
.nav-chev{margin-left:auto;color:var(--gd);display:flex;align-items:center;transition:transform .2s}
.nav-chev.up{transform:rotate(180deg)}
.nav-sub{padding-left:44px;height:38px;font-size:14px;font-weight:400;color:var(--rp-black);display:flex;align-items:center;cursor:pointer;transition:background .1s}
.nav-sub:hover{background:var(--gl)}
.nav-sub.active{color:var(--rp);font-weight:500}
.sn-bot{margin-top:auto;border-top:1px solid var(--gll);padding:12px}
.sn-user{display:flex;align-items:center;gap:10px;padding:6px}
.sidenav.col .sn-user span{display:none}
.uav{width:32px;height:32px;min-width:32px;border-radius:50%;background:var(--rp);color:#fff;font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:center}
.main{flex:1;overflow-y:auto;transition:padding-right .25s}
.main.aio{padding-right:380px}
/* RAUL Page Header */
.ph-strip{background:var(--gl);border-bottom:1px solid var(--gll);padding:24px 40px;display:flex;align-items:flex-end;justify-content:space-between}
.ph-eyebrow{display:flex;gap:5px;align-items:center;margin-bottom:8px}
.ph-dot{height:8px;border-radius:4px;display:inline-block}
.ph-dot.or{width:16px;background:var(--orange)}
.ph-dot.gr{width:28px;background:var(--gm)}
.ph-title{font-size:20px;font-weight:700;color:var(--rp-black);line-height:26px}
.ph-sub{font-size:14px;color:var(--rp-black);opacity:0.75;margin-top:3px;line-height:18px}
.page-body{padding:24px 40px}
/* RAUL Filter Bar */
.fbar{background:#fff;border-bottom:1px solid var(--gll);padding:12px 40px;display:flex;align-items:flex-end;gap:12px;flex-wrap:wrap;position:sticky;top:0;z-index:10;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.fsearch-wrap{position:relative;flex-shrink:0}
.fsearch{height:40px;width:165px;border:1px solid var(--gm);border-radius:2px;padding:0 12px 0 34px;font-size:14px;font-family:var(--font);outline:none;color:var(--rp-black);background:#fff}
.fsearch:focus{border-color:var(--rp)}
.fsearch::placeholder{color:var(--gm)}
.fsearch-ic{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--gm);pointer-events:none}
.fsel-wrap{position:relative;flex-shrink:0}
.fsel-lbl{position:absolute;top:-9px;left:8px;background:#fff;padding:0 4px;font-size:12px;font-weight:500;color:var(--rp-black);z-index:1;white-space:nowrap;line-height:18px}
.fsel{height:40px;border:1px solid var(--gm);border-radius:2px;padding:0 28px 0 10px;font-size:14px;font-family:var(--font);outline:none;color:var(--rp-black);background:#fff;appearance:none;cursor:pointer;width:100%}
.fsel:focus{border-color:var(--rp)}
.fsel-arrow{position:absolute;right:8px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--gd)}
.fbtn{display:inline-flex;align-items:center;gap:6px;height:40px;padding:0 14px;border:1px solid var(--gm);border-radius:2px;background:#fff;font-size:13px;font-weight:500;color:var(--rp-black);font-family:var(--font);cursor:pointer;white-space:nowrap;transition:all .1s;flex-shrink:0}
.fbtn:hover{border-color:var(--rp);color:var(--rp)}
.fbtn-cta{display:inline-flex;align-items:center;gap:6px;height:40px;padding:0 16px;border:none;border-radius:var(--br);background:var(--green);font-size:13px;font-weight:600;color:#fff;font-family:var(--font);cursor:pointer;white-space:nowrap;transition:all .1s;flex-shrink:0}
.fbtn-cta:hover{background:#0e7030}
.sn-sect{padding:16px 16px 6px;font-size:11px;font-weight:600;color:var(--gd);text-transform:uppercase;letter-spacing:.5px}
.sn-divider{height:1px;background:var(--gll);margin:8px 16px}
/* KPI Cards */
.kgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:0}
.kcard{background:#fff;border:1px solid var(--gll);border-radius:4px;padding:20px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.kcard::after{content:'';position:absolute;top:0;right:0;border-style:solid;border-width:0 17px 17px 0;border-color:transparent var(--orange) transparent transparent}
.k-lbl{font-size:12px;font-weight:500;color:var(--rp-black);margin-bottom:6px;line-height:18px}
.k-val{font-size:36px;font-weight:700;color:var(--rp-black);line-height:40px}
.k-sub{font-size:14px;font-weight:400;color:var(--rp-black);opacity:0.8;margin-top:6px;line-height:18px}
.k-delta{display:inline-flex;align-items:center;gap:3px;font-size:12px;font-weight:500;margin-top:8px;padding:2px 6px;border-radius:2px}
.k-delta.up{background:var(--gbg);color:var(--green)}.k-delta.dn{background:var(--rbg);color:var(--red)}.k-delta.neu{background:var(--gll);color:var(--rp-black)}
/* Lumina AI Search Bar */
.lumina-prompts{display:flex;gap:10px;margin-top:12px;flex-wrap:wrap}
.lumina-prompt{padding:8px 14px;border:1px solid var(--gll);border-radius:4px;font-size:12px;color:var(--rp-black);cursor:pointer;transition:all .15s;background:#fff;white-space:nowrap}
.lumina-prompt:hover{border-color:var(--rp);color:var(--rp);background:var(--hi)}
/* Insight cards */
.li-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:0}
.li-card{background:#fff;border:1px solid var(--gll);border-radius:4px;padding:17px;position:relative;overflow:hidden;box-shadow:var(--shadow)}
.li-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px}
.li-card.al::before{background:var(--red)}.li-card.rc::before{background:var(--orange)}.li-card.en::before{background:var(--pur)}.li-card.tr::before{background:var(--green)}
.li-card::after{content:'';position:absolute;top:0;right:0;border-style:solid;border-width:0 17px 17px 0;border-color:transparent var(--orange) transparent transparent}
.li-type{font-size:12px;font-weight:500;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;display:flex;align-items:center;gap:4px}
.li-type.al{color:var(--red)}.li-type.rc{color:var(--orange)}.li-type.en{color:var(--pur)}.li-type.tr{color:var(--green)}
.li-ttl{font-size:14px;font-weight:400;color:var(--rp-black);line-height:18px;margin-bottom:10px}
.li-cta{font-size:14px;font-weight:500;color:var(--rp);cursor:pointer;display:flex;align-items:center;gap:3px}
.li-cta:hover{text-decoration:underline}
/* Signal widget */
.signal-widget{background:#fff;border:1px solid var(--gll);border-radius:14px;box-shadow:0px 4px 6px rgba(32,39,55,0.12);padding:28px;position:relative;overflow:hidden}
.signal-score{font-size:72px;font-weight:400;color:var(--rp-black);line-height:1;font-family:var(--font)}
.signal-trend-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:32px;font-size:12px;font-weight:500}
.signal-narrative{font-size:12px;color:var(--rp-black);line-height:19px;margin-top:16px}
.signal-narrative ul{margin-left:16px;margin-top:4px}
.signal-narrative li{margin-bottom:2px}
.signal-narrative a{color:var(--rp);text-decoration:none;font-weight:500}
.signal-narrative a:hover{text-decoration:underline}
/* Section headers */
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;margin-top:28px}
.sh-t{font-size:16px;font-weight:700;color:var(--rp-black);line-height:20px;display:flex;align-items:center;gap:8px}
.sh-l{font-size:14px;color:var(--rp);cursor:pointer;font-weight:500}.sh-l:hover{text-decoration:underline}
.sh-badge{font-size:12px;font-weight:500;padding:2px 8px;border-radius:2px;background:var(--rbg);color:var(--red)}
/* Card */
.card{background:#fff;border:1px solid var(--gll);border-radius:4px;padding:24px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.card::after{content:'';position:absolute;top:0;right:0;border-style:solid;border-width:0 17px 17px 0;border-color:transparent var(--orange) transparent transparent}
.ct{font-size:16px;font-weight:700;color:var(--rp-black);line-height:20px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.ct-sub{font-size:14px;font-weight:400;color:var(--rp-black);opacity:0.8;margin-top:4px;line-height:18px}
.ct-link{font-size:12px;font-weight:500;color:var(--rp);cursor:pointer}.ct-link:hover{text-decoration:underline}
/* Grid layouts */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:16px}
.g12{display:grid;grid-template-columns:1fr 2fr;gap:16px;margin-bottom:16px}
/* Table */
.dt{width:100%;border-collapse:collapse}
.dt th{font-size:12px;font-weight:500;color:var(--rp-black);padding:0 16px;height:37px;text-align:left;border-bottom:1px solid var(--gll);background:var(--gl);white-space:nowrap;vertical-align:middle}
.dt th.r{text-align:right}
.dt td{padding:0 16px;height:38px;border-bottom:1px solid var(--gll);font-size:12px;color:var(--rp-black);vertical-align:middle}
.dt td.r{text-align:right}.dt tr:hover td{background:var(--gl)}.dt tr:last-child td{border-bottom:none}
.dt td.vlink{color:var(--rp);font-weight:500;cursor:pointer}.dt td.vlink:hover{text-decoration:underline}
/* Badges */
.ds-badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:500;padding:3px 9px;border-radius:4px;white-space:nowrap}
.ds-badge.compliant{background:#E8F4FC;color:#3d94c0;border:1px solid #b8dcf0}
.ds-badge.non-compliant{background:#FBE9EA;color:#d01a1f;border:1px solid #f5c6c7}
.ds-badge.under-review{background:#FEF0E6;color:#f06000;border:1px solid #fbd5b5}
.ds-badge.preferred{background:#EAF5EE;color:#118837;border:1px solid #b7dfc4}
.ds-badge.non-preferred{background:var(--gll);color:var(--gd);border:1px solid #d4d8db}
.viol-circle{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;font-size:11px;font-weight:700;flex-shrink:0}
.viol-circle.cr{background:#d01a1f;color:#fff}
.viol-circle.wa{background:#f06000;color:#fff}
.viol-circle.lo{background:var(--gll);color:var(--gd)}
.tag{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:500;padding:2px 8px;border-radius:2px}
.tag.g{background:var(--gbg);color:var(--green)}.tag.r{background:var(--rbg);color:var(--red)}.tag.y{background:var(--ybg);color:var(--orange)}.tag.b{background:rgba(0,118,204,0.1);color:var(--rp)}.tag.gr{background:var(--gll);color:var(--rp-black)}.tag.p{background:var(--pbg);color:var(--pur)}
.rpill{display:inline-flex;align-items:center;font-size:10px;font-weight:600;padding:2px 7px;border-radius:2px;text-transform:uppercase;gap:3px}
.rpill.h{background:var(--rbg);color:var(--red)}.rpill.m{background:var(--ybg);color:var(--orange)}.rpill.l{background:var(--gbg);color:var(--green)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:4px;font-size:14px;font-weight:500;cursor:pointer;border:none;font-family:var(--font);transition:all .1s}
.bp{background:var(--rp);color:#fff}.bp:hover{background:var(--rp-dk)}
.bs{background:#fff;color:var(--rp);border:1px solid var(--rp)}.bs:hover{background:var(--hi)}
.bg{background:#fff;color:var(--rp-black);border:1px solid var(--gm)}.bg:hover{background:var(--gl)}
.bd{background:var(--red);color:#fff}
.sm{padding:6px 12px;font-size:12px}.xs{padding:3px 9px;font-size:11px}
.tabs{display:flex;border-bottom:2px solid var(--gll);margin-bottom:14px}
.tab{padding:8px 16px;font-size:13px;color:var(--gd);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .1s;user-select:none}
.tab.on{color:var(--rp);font-weight:500;border-bottom-color:var(--rp)}.tab:hover:not(.on){color:var(--gd)}
.prog{height:6px;background:var(--gll);border-radius:3px;overflow:hidden}
.prog-f{height:100%;border-radius:3px;transition:width .4s}
.bnr{border-left:3px solid;border-radius:var(--br);padding:9px 12px;font-size:12px;display:flex;align-items:center;gap:10px;margin-bottom:12px}
.bnr.r{background:var(--rbg);border-left-color:var(--red)}.bnr.y{background:var(--ybg);border-left-color:var(--yel)}.bnr.b{background:var(--hi);border-left-color:var(--rp)}.bnr.g{background:var(--gbg);border-left-color:var(--green)}
/* Investigation cards */
.ccase{background:#fff;border:1px solid var(--gll);border-left:3px solid;border-radius:var(--br);padding:14px;margin-bottom:10px;cursor:pointer;transition:box-shadow .15s}
.ccase:hover{box-shadow:0 2px 8px rgba(0,0,0,.08)}
.ccase.cr{border-left-color:var(--red)}.ccase.wa{border-left-color:var(--yel)}
.fc{display:inline-flex;align-items:center;padding:4px 12px;border:1px solid var(--gm);border-radius:2px;font-size:12px;font-weight:500;color:var(--rp-black);cursor:pointer;user-select:none;transition:all .1s;background:#fff}
.fc:hover{border-color:var(--rp);color:var(--rp)}.fc.on{background:var(--rp);color:#fff;border-color:var(--rp)}
/* Lumina Panel */
.lp{position:fixed;top:56px;right:0;bottom:0;width:380px;background:#fff;border-left:1px solid var(--gll);display:flex;flex-direction:column;z-index:90;transform:translateX(100%);transition:transform .25s cubic-bezier(.4,0,.2,1);box-shadow:-4px 0 20px rgba(0,0,0,.08)}
.lp.open{transform:translateX(0)}
.lp-hdr{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid var(--gll);background:linear-gradient(135deg,#6366F1,#8B5CF6)}
.lp-ic{width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center}
.lp-t{color:#fff;font-size:14px;font-weight:600}.lp-s{color:rgba(255,255,255,.75);font-size:10px}
.lp-cl{margin-left:auto;color:rgba(255,255,255,.8);cursor:pointer;padding:4px;border-radius:50%}.lp-cl:hover{background:rgba(255,255,255,.1)}
.lp-msgs{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px}
.lm{max-width:90%}.lm.ai{align-self:flex-start}.lm.user{align-self:flex-end}
.lb{padding:9px 11px;border-radius:10px;font-size:12px;line-height:1.5}
.lm.ai .lb{background:var(--gl);border:1px solid var(--gll);color:var(--rp-black);border-radius:2px 10px 10px 10px}
.lm.user .lb{background:var(--rp);color:#fff;border-radius:10px 10px 2px 10px}
.lt{font-size:10px;color:var(--gd);margin-top:3px}
.ldc{background:#fff;border:1px solid var(--gll);border-radius:6px;padding:9px;margin-top:7px}
.ldc-t{font-size:10px;font-weight:600;color:var(--gd);margin-bottom:5px}
.ldr{display:flex;justify-content:space-between;padding:3px 0;font-size:11px;border-bottom:1px solid var(--gll)}.ldr:last-child{border-bottom:none}
.ldr .dv{font-weight:600}.ldr .dv.r{color:var(--red)}.ldr .dv.g{color:var(--green)}.ldr .dv.w{color:var(--yel)}
.lp-chips{display:flex;flex-wrap:wrap;gap:5px;padding:8px 12px;border-top:1px solid var(--gll)}
.lchip{padding:5px 9px;border-radius:12px;font-size:11px;background:var(--gl);border:1px solid var(--gll);cursor:pointer;color:var(--gd);transition:all .1s}
.lchip:hover{background:var(--hi);border-color:var(--rp);color:var(--rp)}
.lp-inp{padding:9px 12px;border-top:1px solid var(--gll);display:flex;gap:7px}
.linput{flex:1;border:1px solid var(--gll);border-radius:15px;padding:6px 12px;font-size:12px;font-family:var(--font);outline:none;transition:border-color .15s}
.linput:focus{border-color:var(--rp)}
.lsend{width:30px;height:30px;background:var(--rp);color:#fff;border:none;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.tdots{display:flex;gap:4px;padding:5px 2px}
.tdot{width:6px;height:6px;border-radius:50%;background:var(--gd);animation:bnc 1.4s infinite}
.tdot:nth-child(2){animation-delay:.2s}.tdot:nth-child(3){animation-delay:.4s}

const DonutChart = ({segs,size=130,thick=22,center}) => {
  const cx=size/2,cy=size/2,r=size/2-thick/2;
  const toXY=(deg)=>{const rad=(deg-90)*Math.PI/180;return{x:cx+r*Math.cos(rad),y:cy+r*Math.sin(rad)};};
  let start=0;
  const arcs=segs.map(seg=>{const sw=(seg.pct/100)*359.99;const s=toXY(start);const e=toXY(start+sw);const d=`M ${s.x} ${s.y} A ${r} ${r} 0 ${sw>180?1:0} 1 ${e.x} ${e.y}`;start+=sw;return {...seg,d};});
  return (
    <svg width={size} height={size}>
      <circle cx={cx} cy={cy} r={r} fill="none" stroke="var(--gll)" strokeWidth={thick}/>
      {arcs.map((a,i)=><path key={i} d={a.d} fill="none" stroke={a.color} strokeWidth={thick} strokeLinecap="butt"/>)}
      {center&&<text x={cx} y={cy-6} textAnchor="middle" fontSize={20} fontWeight={700} fill="var(--rp-black)">{center.val}</text>}
      {center&&<text x={cx} y={cy+10} textAnchor="middle" fontSize={10} fill="var(--gd)">{center.label}</text>}
    </svg>
  );
};

const LineChart = ({series,lbls,w=340,h=110,colors=['var(--ch3)','var(--ch4)'],showDots=true,showArea=false,dashed=[]}) => {
  const all=series.flat();
  const mn=Math.min(...all)-3,mx=Math.max(...all)+3,rng=mx-mn||1;
  const pl={t:8,r:8,b:22,l:30};
  const cw=w-pl.l-pl.r,ch=h-pl.t-pl.b;
  const px=(v,i,len)=>pl.l+(i/Math.max(len-1,1))*cw;
  const py=(v)=>pl.t+ch-((v-mn)/rng)*ch;
  const mkPath=(s)=>s.map((v,i)=>`${i===0?'M':'L'} ${px(v,i,s.length)} ${py(v)}`).join(' ');
  return (
    <svg width={w} height={h} style={{overflow:'visible'}}>
      {[0,25,50,75,100].map(v=>{const y=py(v);return (y>=pl.t&&y<=pl.t+ch)?<line key={v} x1={pl.l} y1={y} x2={pl.l+cw} y2={y} stroke="var(--gll)" strokeWidth={1}/>:null;})}
      {series.map((s,i)=>(
        <g key={i}>
          {showArea&&i===0&&<path d={`${mkPath(s)} L ${px(0,s.length-1,s.length)} ${pl.t+ch} L ${pl.l} ${pl.t+ch} Z`} fill={colors[i]} opacity={0.08}/>}
          <path d={mkPath(s)} fill="none" stroke={colors[i]||'var(--ch3)'} strokeWidth={2} strokeLinecap="round" strokeLinejoin="round" strokeDasharray={dashed[i]?'6,4':'none'}/>
          {showDots&&!dashed[i]&&s.map((v,j)=><circle key={j} cx={px(v,j,s.length)} cy={py(v)} r={2.5} fill={colors[i]||'var(--ch3)'}/>)}
        </g>
      ))}
      {lbls&&lbls.map((l,i)=><text key={i} x={pl.l+(i/Math.max(lbls.length-1,1))*cw} y={h-5} textAnchor="middle" fontSize={9} fill="var(--gd)">{l}</text>)}
    </svg>
  );
};

const SparkLine = ({data,color='var(--ch3)',h=40,w=120}) => {
  const mn=Math.min(...data),mx=Math.max(...data),rng=mx-mn||1;
  const pts = data.map((v,i)=>`${(i/(data.length-1))*w},${h-((v-mn)/rng)*h}`).join(' ');
  return (
    <svg width={w} height={h} style={{overflow:'visible'}}>
      <polyline points={pts} fill="none" stroke={color} strokeWidth={1.5} strokeLinecap="round" strokeLinejoin="round"/>
      <circle cx={(data.length-1)/(data.length-1)*w} cy={h-((data[data.length-1]-mn)/rng)*h} r={3} fill={color}/>
    </svg>
  );
};

const RadarChart = ({dims,size=220}) => {
  const cx=size/2,cy=size/2,r=size/2-30;
  const n=dims.length;
  const angle=(i)=>(i*2*Math.PI/n)-Math.PI/2;
  const pt=(i,pct)=>({x:cx+r*(pct/100)*Math.cos(angle(i)),y:cy+r*(pct/100)*Math.sin(angle(i))});
  const gridLevels=[25,50,75,100];
  return (
    <svg width={size} height={size}>
      {gridLevels.map(lv=>(
        <polygon key={lv} points={dims.map((_,i)=>{const p=pt(i,lv);return `${p.x},${p.y}`;}).join(' ')} fill="none" stroke="var(--gll)" strokeWidth={1}/>
      ))}
      {dims.map((_,i)=>{const p=pt(i,100);return <line key={i} x1={cx} y1={cy} x2={p.x} y2={p.y} stroke="var(--gll)" strokeWidth={1}/>;})}
      <polygon points={dims.map((d,i)=>{const p=pt(i,d.value);return `${p.x},${p.y}`;}).join(' ')} fill="var(--ch3)" fillOpacity={0.15} stroke="var(--ch3)" strokeWidth={2}/>
      {dims.map((d,i)=>{const p=pt(i,d.value);return <circle key={i} cx={p.x} cy={p.y} r={3} fill="var(--ch3)"/>;})}
      {dims.map((d,i)=>{
        const p=pt(i,118);
        const align=p.x<cx-10?'end':p.x>cx+10?'start':'middle';
        return <text key={i} x={p.x} y={p.y} textAnchor={align} fontSize={10} fill="var(--rp-black)" dominantBaseline="middle">{d.label}</text>;

/* ── LUMINA PANEL ─────────────────────────────────────────────── */
const LuminaPanel = ({open,onClose}) => {
  const initMsg = {type:'ai',text:'Hi! I am Lumina, your AI spend assistant. I have been monitoring your procurement data and have a few insights ready. Off-contract spend is trending up this quarter. I can walk you through the details whenever you are ready.\n\nHow can I help you today?',time:'Now',rows:[{l:'Portfolio Score',v:'70% (+2pts QoQ)',t:'g'},{l:'PO-WTN Compliance',v:'95% — above target',t:'g'},{l:'Offline Orders',v:'29.8% (target: 20%)',t:'r'},{l:'Online Vendors',v:'74 of 261 (28.4%)',t:'r'}]};
  const [msgs,setMsgs] = useState([initMsg]);
  const [inp,setInp] = useState('');
  const [typing,setTyping] = useState(false);
  const endRef = useRef(null);

  useEffect(()=>{endRef.current?.scrollIntoView({behavior:'smooth'})},[msgs,typing]);

  const CHIPS = ['Why has off-contract spend increased this quarter?','Show me the top 5 non-compliant vendors','What if we raise the emergency purchase threshold to $700?','Generate a contract compliance report for Q1'];

  const getResp = (q) => {
    const ql = q.toLowerCase();
    if (ql.includes('maverick')||ql.includes('rising')||ql.includes('hvac')||ql.includes('off-contract')||ql.includes('spend')) return LUMINA_RESP.maverick;
    if (ql.includes('vendor')||ql.includes('non-compliant')||ql.includes('coi')) return LUMINA_RESP.vendors;
    if (ql.includes('offline')||ql.includes('leak')) return LUMINA_RESP.offline;
    return LUMINA_RESP.default;
  };

  const send = (text) => {
    const q=(text||inp).trim();
    if (!q) return;
    setMsgs(m=>[...m,{type:'user',text:q,time:'Now'}]);
    setInp('');
    setTyping(true);
    setTimeout(()=>{
      const resp=getResp(q);
      setTyping(false);
      setMsgs(m=>[...m,{type:'ai',text:resp.text,time:'Now',rows:resp.rows}]);
    },1400);
  };

  const tagColor = (t)=>t==='r'?'var(--red)':t==='g'?'var(--green)':t==='w'?'var(--yel)':'var(--rp)';

  return (
    <div className={`lp ${open?'open':''}`}>
      <div className="lp-hdr">
        <div className="lp-ic">
          <svg width={18} height={18} viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth={1.5} strokeLinecap="round" strokeLinejoin="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
        </div>
        <div><div className="lp-t">Lumina AI</div><div className="lp-s">AI Spending Analyst</div></div>
        <div className="lp-cl" onClick={onClose}>
          <svg width={16} height={16} viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth={2} strokeLinecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </div>
      </div>
      <div className="lp-msgs">
        {msgs.map((m,i)=>(
          <div key={i} className={`lm ${m.type}`}>
            <div className="lb">
              {m.text}
              {m.rows&&(
                <div className="ldc">
                  <div className="ldc-t">COMPLIANCE SNAPSHOT</div>
                  {m.rows.map((r,j)=>(
                    <div key={j} className="ldr">
                      <span style={{color:'var(--rp-black)',opacity:0.7}}>{r.l}</span>
                      <span className="dv" style={{color:tagColor(r.t)}}>{r.v}</span>
                    </div>
                  ))}
                </div>
              )}
            </div>
            <div className="lt">{m.time}</div>
          </div>
        ))}
        {typing&&<div className="lm ai"><div className="lb"><div className="tdots"><div className="tdot"/><div className="tdot"/><div className="tdot"/></div></div></div>}
        <div ref={endRef}/>
      </div>
      <div className="lp-chips">{CHIPS.map((c,i)=><div key={i} className="lchip" onClick={()=>send(c)}>{c}</div>)}</div>
      <div className="lp-inp">
        <input className="linput" placeholder="Ask Lumina anything..." value={inp} onChange={e=>setInp(e.target.value)} onKeyDown={e=>e.key==='Enter'&&send()}/>
        <button className="lsend" onClick={()=>send()}>
          <svg width={14} height={14} viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth={2} strokeLinecap="round" strokeLinejoin="round"><path d="M22 2L11 13M22 2L15 22 11 13 2 9l20-7z"/></svg>
        </button>
      </div>
    </div>
  );
};

    {id:'setup',icon:'grid',label:'Setup'},
    {id:'payments',icon:'link',label:'Payments'},
    {id:'report',icon:'file',label:'Report'},
    {id:'helpnav',icon:'help',label:'Help'},
  ];
  const toggleExpand = (id) => setExpanded(e=>({...e,[id]:!e[id]}));
  const isActive = (id) => page===id || (id==='compliance' && ['compliance','catvendor','regprop'].includes(page));
  return (
    <div className={`sidenav ${col?'col':''}`}>
      {sections.map(item=>(
        <div key={item.id} className={`nav-item ${page===item.id?'active':''}`} onClick={()=>onPage(item.id)}>
          <Icon n={item.icon} s={16} c={page===item.id?'var(--rp)':'var(--rp-black)'}/>
          <span>{item.label}</span>
        </div>
      ))}
      <React.Fragment>
        <div className={`nav-item ${isActive('compliance')?'active':''}`}
          onClick={()=>{toggleExpand('compliance');onPage('compliance')}}>
          <Icon n="shield" s={16} c={isActive('compliance')?'var(--rp)':'var(--rp-black)'}/>
          <span>{compSection.label}</span>
          <span className={`nav-chev ${expanded.compliance?'up':''}`}>
            <svg width={12} height={12} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={2}><path d="M6 9l6 6 6-6"/></svg>
          </span>
        </div>
        {expanded.compliance&&compSection.subs.map(sub=>(
          <div key={sub.id} className={`nav-sub ${page===sub.id?'active':''}`} onClick={()=>onPage(sub.id)}>
            {sub.label}
          </div>
        ))}
      </React.Fragment>
      {otherItems.map(item=>(
        <div key={item.id} className={`nav-item ${page===item.id?'active':''}`} onClick={()=>onPage(item.id)}>
          <Icon n={item.icon} s={16} c={page===item.id?'var(--rp)':'var(--rp-black)'}/>
          <span>{item.label}</span>
        </div>
      ))}
      <div className="sn-divider"/>
      <div className="sn-sect">LUMINA AI</div>
      <div className={`nav-item ${page==='investigations'?'active':''}`} onClick={()=>onPage('investigations')}>
        <Icon n="zap" s={16} c={page==='investigations'?'var(--rp)':'var(--rp-black)'}/>
        <span>AI Activity Log</span>
      </div>
      <div className="sn-divider"/>
      {bottomItems.map(item=>(
        <div key={item.id} className={`nav-item ${page===item.id?'active':''}`} onClick={()=>onPage(item.id)}>
          <Icon n={item.icon} s={16} c={page===item.id?'var(--rp)':'var(--rp-black)'}/>
          <span>{item.label}</span>
        </div>
      ))}
      <div className="sn-bot">
        <div className="sn-user">
          <div className="uav">JS</div>
          <div>
            <div style={{fontSize:12,fontWeight:500}}>John Smith</div>
            <div style={{fontSize:10,color:'var(--gd)'}}>Leasing Agent</div>
          </div>
        </div>
      </div>
    </div>
  );
};

/* ── APP ──────────────────────────────────────────────────────── */
const App = () => {
  const [page,setPage] = useState('compliance');
  const [aiOpen,setAiOpen] = useState(false);
  const [navCol,setNavCol] = useState(false);

  const getActiveTab = () => {
    if (page === 'catvendor') return 'catvendor';
    if (page === 'regprop') return 'regprop';
    return 'portfolio';
  };

  const renderPage = () => {
    if (['compliance','catvendor','regprop'].includes(page)) {
      return <SpendCompliance onPage={setPage} activeTab={getActiveTab()}/>;
    }
    if (page === 'investigations') return <Investigations/>;
    return <SpendCompliance onPage={setPage} activeTab="portfolio"/>;
  };

  return (
    <>
      <Omnibar aiOpen={aiOpen} onAI={()=>setAiOpen(o=>!o)} onMenu={()=>setNavCol(c=>!c)}/>
      <div className="app-shell">
        <SideNav page={page} onPage={setPage} col={navCol}/>
        <div className={`main ${aiOpen?'aio':''}`}>
          {renderPage()}
        </div>
      </div>
      <LuminaPanel open={aiOpen} onClose={()=>setAiOpen(false)}/>
    </>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
