<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Spend Compliance Agent — OPSBUYER | RealPage</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Lato:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{--rp:#0076CC;--rp-dk:#005FA3;--rp-black:#202737;--hi:#E5F4FF;--gl:#F7F8F9;--gll:#EBEDEE;--gm:#C6CCD0;--gd:#9BA3A7;--green:#118837;--gbg:rgba(17,136,55,0.1);--red:#D01A1F;--rbg:rgba(208,26,31,0.1);--orange:#F06000;--yel:#D97706;--ybg:rgba(240,96,0,0.1);--pur:#7C3AED;--pbg:rgba(124,58,237,0.1);--font:'Roboto',-apple-system,sans-serif;--shadow:0px 6px 8px 0px rgba(32,39,55,0.04);--br:4px;--ch1:#B9E6EC;--ch2:#77C6D0;--ch3:#3D94C0;--ch4:#2A5599;--ch5:#131C57}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--gl);color:var(--rp-black);font-size:14px;line-height:1.4}
/* RAUL Omnibar */
.omnibar{height:56px;background:var(--rp-black);display:flex;align-items:center;padding:0 16px;gap:12px;position:fixed;top:0;left:0;right:0;z-index:100}
.ob-ham{color:#fff;cursor:pointer;display:flex;align-items:center;padding:4px;border-radius:4px;flex-shrink:0}.ob-ham:hover{background:rgba(255,255,255,.1)}
.ob-dots{display:flex;gap:3px;flex-shrink:0}
.ob-dots span{width:8px;height:8px;border-radius:50%;display:block}
.ob-dots span:nth-child(1),.ob-dots span:nth-child(2){background:var(--orange)}
.ob-dots span:nth-child(3){background:var(--rp)}
.ob-brand{display:flex;flex-direction:column;flex-shrink:0}
.ob-brand-name{color:#fff;font-size:12px;font-weight:500;line-height:18px;letter-spacing:0}
.ob-brand-ctx{color:rgba(255,255,255,.8);font-size:12px;line-height:18px}
.ob-search{flex:1;max-width:340px;margin:0 auto;background:#FFFFFF;border:none;border-radius:16px;padding:7px 14px;display:flex;align-items:center;gap:8px;height:32px}
.ob-search input{background:transparent;border:none;outline:none;color:var(--rp-black);font-size:14px;width:100%;font-family:var(--font)}
.ob-search input::placeholder{color:rgba(32,39,55,.8)}
.ob-acts{display:flex;align-items:center;gap:2px;flex-shrink:0}
.ob-ib{width:32px;height:32px;border-radius:50%;background:transparent;border:none;color:rgba(255,255,255,.7);cursor:pointer;display:flex;align-items:center;justify-content:center;position:relative;transition:background .15s;flex-shrink:0}
.ob-ib:hover{background:rgba(255,255,255,.1)}
.ob-dot{position:absolute;top:4px;right:4px;width:8px;height:8px;background:var(--orange);border-radius:50%;border:1.5px solid var(--rp-black)}
.ob-user{display:flex;align-items:center;gap:8px;flex-shrink:0}
.ob-user-info{display:flex;flex-direction:column;text-align:right}
.ob-user-name{color:#fff;font-size:12px;font-weight:500;line-height:18px;text-align:right}
.ob-user-role{color:rgba(255,255,255,.8);font-size:12px;font-weight:400;line-height:18px;text-align:right}
.ob-av{width:32px;height:32px;border-radius:50%;background:var(--rp);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0}
.lumina-btn{background:linear-gradient(135deg,#6366F1,#8B5CF6);color:#fff;border:none;border-radius:4px;padding:7px 14px;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;font-family:var(--font);white-space:nowrap;transition:all .15s;flex-shrink:0}
.lumina-btn:hover{background:linear-gradient(135deg,#4F46E5,#7C3AED)}
.lumina-btn.active{box-shadow:0 0 0 2px rgba(99,102,241,.7),0 0 12px rgba(99,102,241,.4)}
.app-shell{display:flex;margin-top:56px;height:calc(100vh - 56px)}
/* RAUL SideNav */
.sidenav{width:240px;min-width:240px;background:#fff;border-right:1px solid var(--gll);display:flex;flex-direction:column;overflow-y:auto;transition:width .2s}
.sidenav.col{width:52px;min-width:52px}
.sidenav.col .sn-sect,.sidenav.col .nav-item span,.sidenav.col .nav-chev{display:none}
.nav-item{display:flex;align-items:center;gap:12px;padding:16px 16px 14px 15px;height:46px;cursor:pointer;color:var(--rp-black);font-size:14px;font-weight:500;line-height:14px;position:relative;transition:background .1s;user-select:none;border-bottom:1px solid var(--gll)}
.nav-item:hover{background:var(--gl)}
.nav-item.active{background:var(--hi);color:var(--rp);font-weight:500}
.nav-chev{margin-left:auto;color:var(--gd);display:flex;align-items:center;transition:transform .2s}
.nav-chev.up{transform:rotate(180deg)}
.nav-sub{padding:11px 16px 11px 42px;height:40px;font-size:14px;font-weight:400;color:rgba(32,39,55,0.8);line-height:18px;display:flex;align-items:center;cursor:pointer;transition:background .1s}
.nav-sub:hover{background:var(--gl)}
.nav-sub.active{color:var(--rp);font-weight:500}
.sn-bot{margin-top:auto;border-top:1px solid var(--gll);padding:12px}
.sn-user{display:flex;align-items:center;gap:10px;padding:6px}
.sidenav.col .sn-user span{display:none}
.uav{width:32px;height:32px;min-width:32px;border-radius:50%;background:var(--rp);color:#fff;font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:center}
.main{flex:1;overflow-y:auto;transition:padding-right .25s}
.main.aio{padding-right:380px}
/* RAUL Page Header */
.ph-strip{background:var(--gl);border-bottom:1px solid var(--gll);padding:24px 40px;display:flex;align-items:flex-end;justify-content:space-between}
.ph-eyebrow{display:flex;gap:5px;align-items:center;margin-bottom:8px}
.ph-dot{height:8px;border-radius:4px;display:inline-block}
.ph-dot.or{width:16px;background:var(--orange)}
.ph-dot.gr{width:28px;background:var(--gm)}
.ph-title{font-family:'Roboto',sans-serif;font-size:20px;font-weight:700;color:var(--rp-black);line-height:26px}
.ph-sub{font-size:14px;color:var(--rp-black);opacity:0.75;margin-top:3px;line-height:18px}
.page-body{padding:24px 40px}
/* RAUL Filter Bar */
.fbar{background:#fff;border-bottom:1px solid var(--gll);padding:12px 40px;display:flex;align-items:flex-end;gap:12px;flex-wrap:wrap;position:sticky;top:0;z-index:10;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.fsearch-wrap{position:relative;flex-shrink:0}
.fsearch{height:40px;width:165px;border:1px solid #E9EAEB;border-radius:8px;padding:0 12px 0 34px;font-size:14px;font-family:'Lato',sans-serif;outline:none;color:var(--rp-black);background:#fff}
.fsearch:focus{border-color:var(--rp)}
.fsearch::placeholder{color:#C7CCD0}
.fsearch-ic{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--gm);pointer-events:none}
.fsel-wrap{position:relative;flex-shrink:0}
.fsel-lbl{position:absolute;top:-9px;left:8px;background:#fff;padding:0 4px;font-size:12px;font-weight:500;color:var(--rp-black);z-index:1;white-space:nowrap;line-height:18px}
.fsel{height:40px;border:1px solid #E9EAEB;border-radius:8px;padding:0 28px 0 12px;font-size:14px;font-family:'Lato',sans-serif;outline:none;color:var(--rp-black);background:#fff;appearance:none;cursor:pointer;width:100%}
.fsel:focus{border-color:var(--rp)}
.fsel-arrow{position:absolute;right:8px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--gd)}
.fbtn{display:inline-flex;align-items:center;gap:6px;height:40px;padding:0 14px;border:1px solid #E9EAEB;border-radius:8px;background:#fff;font-size:14px;font-weight:500;color:var(--rp-black);font-family:var(--font);cursor:pointer;white-space:nowrap;transition:all .1s;flex-shrink:0}
.fbtn:hover{border-color:var(--rp);color:var(--rp)}
.fbtn-cta{display:inline-flex;align-items:center;gap:6px;height:40px;padding:0 16px;border:none;border-radius:20px;background:#0076CC;font-size:14px;font-weight:500;color:#fff;font-family:var(--font);cursor:pointer;white-space:nowrap;transition:all .1s;flex-shrink:0}
.fbtn-cta:hover{background:#005FA3}
.sn-sect{padding:16px 16px 6px;font-size:11px;font-weight:600;color:var(--gd);text-transform:uppercase;letter-spacing:.5px}
.sn-divider{height:1px;background:var(--gll);margin:8px 16px}
/* KPI Cards */
.kgrid5{display:grid;grid-template-columns:repeat(5,1fr);gap:16px;margin-bottom:0}
.kcard{background:#fff;border:1px solid var(--gll);border-radius:4px;padding:24px 20px;box-shadow:var(--shadow);position:relative;overflow:hidden;cursor:pointer;transition:box-shadow .15s}
.kcard:hover{box-shadow:0 2px 12px rgba(0,0,0,.08)}
.kcard::after{content:'';position:absolute;top:0;right:0;border-style:solid;border-width:0 17px 17px 0;border-color:transparent var(--rp) transparent transparent}
.kcard.orange::after{border-color:transparent var(--orange) transparent transparent}
.k-lbl{font-size:14px;font-weight:700;color:var(--rp-black);margin-bottom:6px;line-height:18px}
.k-val{font-size:32px;font-weight:700;color:var(--rp-black);line-height:36px}
.k-val.orange{color:var(--orange)}
.k-sub{font-size:12px;font-weight:400;color:var(--rp-black);opacity:0.8;margin-top:6px;line-height:18px}
.k-delta{display:inline-flex;align-items:center;gap:3px;font-size:12px;font-weight:500;margin-top:8px;padding:2px 6px;border-radius:2px}
.k-delta.up{background:var(--gbg);color:var(--green)}.k-delta.dn{background:var(--rbg);color:var(--red)}.k-delta.neu{background:var(--gll);color:var(--rp-black)}
/* Lumina prompt chips */
.lumina-prompts{display:flex;gap:16px;margin-top:12px;flex-wrap:wrap}
.lumina-prompt{padding:10px;border:none;border-radius:8px;font-size:12px;line-height:18px;color:var(--rp-black);cursor:pointer;transition:all .15s;background:#FFFFFF;white-space:nowrap;text-align:center;display:flex;align-items:center;justify-content:center}
.lumina-prompt:hover{background:var(--hi);color:var(--rp)}
/* Insight cards */
.li-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:0}
.li-card{background:#fff;border:1px solid var(--gll);border-radius:4px;padding:17px 17px 14px;position:relative;overflow:hidden;box-shadow:var(--shadow)}
.li-type{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.55px;margin-bottom:8px;display:flex;align-items:center;gap:8px;color:var(--rp-black)}
.li-ttl{font-size:12px;font-weight:400;color:#4D525F;line-height:18px;margin-bottom:10px}
.li-cta{font-size:12px;font-weight:500;color:var(--rp);cursor:pointer;display:flex;align-items:center;gap:3px}
.li-cta:hover{text-decoration:underline}
/* Section headers */
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;margin-top:28px}
.sh-t{font-family:'Lato',sans-serif;font-size:16px;font-weight:900;color:var(--rp-black);line-height:112.5%;display:flex;align-items:center;gap:8px}
.sh-sub{font-size:12px;color:var(--gd);font-weight:400;margin-top:2px}
.sh-l{font-size:14px;color:var(--rp);cursor:pointer;font-weight:500}.sh-l:hover{text-decoration:underline}
.sh-badge{font-size:11px;font-weight:500;padding:2px 8px;border-radius:2px;background:var(--rbg);color:var(--red)}
/* Card */
.card{background:#fff;border:1px solid var(--gll);border-radius:4px;padding:24px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.card::after{content:'';position:absolute;top:0;right:0;border-style:solid;border-width:0 17px 17px 0;border-color:transparent var(--orange) transparent transparent}
.ct{font-family:'Roboto',sans-serif;font-size:16px;font-weight:700;color:var(--rp-black);line-height:20px;margin-bottom:4px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.ct-sub{font-family:'Roboto',sans-serif;font-size:12px;font-weight:400;color:var(--gd);margin-bottom:12px;line-height:18px}
.ct-link{font-size:12px;font-weight:500;color:var(--rp);cursor:pointer}.ct-link:hover{text-decoration:underline}
/* Grid layouts */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:16px}
/* Table */
.dt{width:100%;border-collapse:collapse}
.dt th{font-family:'Roboto',sans-serif;font-size:12px;font-weight:500;color:var(--rp-black);padding:0 16px;height:36px;text-align:left;border-bottom:1px solid var(--gll);background:#fff;white-space:nowrap;vertical-align:middle;line-height:18px}
.dt th.r{text-align:right}
.dt td{padding:0 16px;height:40px;border-bottom:1px solid var(--gll);font-family:'Roboto',sans-serif;font-size:12px;color:var(--rp-black);vertical-align:middle;line-height:18px}
.dt td.r{text-align:right}.dt tr:hover td{background:var(--gl)}.dt tr:last-child td{border-bottom:none}
.dt td.vlink{color:var(--rp);font-weight:500;cursor:pointer}.dt td.vlink:hover{text-decoration:underline}
/* Badges */
.ds-badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:2px 8px;border-radius:4px;white-space:nowrap;line-height:18px}
.ds-badge.compliant{background:#3D94C0;color:#FFFFFF}
.ds-badge.non-compliant{background:#D01A1F;color:#FFFFFF}
.ds-badge.under-review{background:#F06000;color:#FFFFFF}
.ds-badge.high-risk{background:var(--rbg);color:var(--red);font-weight:700}
.ds-badge.needs-review{background:var(--ybg);color:var(--orange);font-weight:700}
.tag{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:500;padding:2px 8px;border-radius:2px}
.tag.g{background:var(--gbg);color:var(--green)}.tag.r{background:var(--rbg);color:var(--red)}.tag.y{background:var(--ybg);color:var(--orange)}.tag.b{background:rgba(0,118,204,0.1);color:var(--rp)}.tag.gr{background:var(--gll);color:var(--rp-black)}.tag.p{background:var(--pbg);color:var(--pur)}
.rpill{display:inline-flex;align-items:center;font-size:10px;font-weight:600;padding:2px 7px;border-radius:2px;text-transform:uppercase;gap:3px}
.rpill.h{background:var(--rbg);color:var(--red)}.rpill.m{background:var(--ybg);color:var(--orange)}.rpill.l{background:var(--gbg);color:var(--green)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:4px;font-size:14px;font-weight:500;cursor:pointer;border:none;font-family:var(--font);transition:all .1s}
.bp{background:var(--rp);color:#fff}.bp:hover{background:var(--rp-dk)}
.bs{background:#fff;color:var(--rp);border:1px solid var(--rp)}.bs:hover{background:var(--hi)}
.bg{background:#fff;color:var(--rp-black);border:1px solid var(--gm)}.bg:hover{background:var(--gl)}
.sm{padding:6px 12px;font-size:12px}.xs{padding:3px 9px;font-size:11px}
.tabs{display:flex;border-bottom:2px solid var(--gll);margin-bottom:14px}
.tab{padding:12px 16px;font-family:'Lato',sans-serif;font-size:14px;font-weight:600;line-height:22px;color:var(--rp-black);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .1s;user-select:none;display:flex;align-items:center;text-align:center}
.tab.on{color:var(--rp);border-bottom-color:var(--rp)}.tab:hover:not(.on){color:var(--rp-black);opacity:0.7}
.prog{height:6px;background:rgba(0,118,204,0.15);border-radius:9999px;overflow:hidden}
.prog-f{height:100%;border-radius:9999px;transition:width .4s}
/* Bridge mini KPIs */
.bridge-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:12px}
.bridge-card{background:#fff;border:1px solid var(--gll);border-radius:4px;padding:16px 14px;text-align:center;box-shadow:var(--shadow)}
.bridge-val{font-size:22px;font-weight:700;color:var(--rp-black);line-height:26px}
.bridge-lbl{font-size:11px;color:var(--gd);margin-top:4px;line-height:14px;font-weight:500}
.bridge-sub{font-size:10px;margin-top:4px}
/* Exceptions section */
.exc-kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:20px}
.exc-kpi{text-align:left}
.exc-kpi-lbl{font-size:12px;color:var(--gd);margin-bottom:4px;font-weight:500}
.exc-kpi-val{font-size:28px;font-weight:700;color:var(--rp-black);line-height:32px}
/* Lumina Panel */
.lp{position:fixed;top:56px;right:0;bottom:0;width:380px;background:#fff;border-left:1px solid var(--gll);display:flex;flex-direction:column;z-index:90;transform:translateX(100%);transition:transform .25s cubic-bezier(.4,0,.2,1);box-shadow:-4px 0 20px rgba(0,0,0,.08)}
.lp.open{transform:translateX(0)}
.lp-hdr{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid var(--gll);background:linear-gradient(135deg,#6366F1,#8B5CF6)}
.lp-ic{width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center}
.lp-t{color:#fff;font-size:14px;font-weight:600}.lp-s{color:rgba(255,255,255,.75);font-size:10px}
.lp-cl{margin-left:auto;color:rgba(255,255,255,.8);cursor:pointer;padding:4px;border-radius:50%}.lp-cl:hover{background:rgba(255,255,255,.1)}
.lp-msgs{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px}
.lm{max-width:90%}.lm.ai{align-self:flex-start}.lm.user{align-self:flex-end}
.lb{padding:9px 11px;border-radius:10px;font-size:12px;line-height:1.5}
.lm.ai .lb{background:var(--gl);border:1px solid var(--gll);color:var(--rp-black);border-radius:2px 10px 10px 10px}
.lm.user .lb{background:var(--rp);color:#fff;border-radius:10px 10px 2px 10px}
.lt{font-size:10px;color:var(--gd);margin-top:3px}
.ldc{background:#fff;border:1px solid var(--gll);border-radius:6px;padding:9px;margin-top:7px}
.ldc-t{font-size:10px;font-weight:600;color:var(--gd);margin-bottom:5px}
.ldr{display:flex;justify-content:space-between;padding:3px 0;font-size:11px;border-bottom:1px solid var(--gll)}.ldr:last-child{border-bottom:none}
.ldr .dv{font-weight:600}
.lp-chips{display:flex;flex-wrap:wrap;gap:5px;padding:8px 12px;border-top:1px solid var(--gll)}
.lchip{padding:5px 9px;border-radius:12px;font-size:11px;background:var(--gl);border:1px solid var(--gll);cursor:pointer;color:var(--gd);transition:all .1s}
.lchip:hover{background:var(--hi);border-color:var(--rp);color:var(--rp)}
.lp-inp{padding:9px 12px;border-top:1px solid var(--gll);display:flex;gap:7px}
.linput{flex:1;border:1px solid var(--gll);border-radius:12px;padding:6px 12px;font-size:12px;font-family:var(--font);outline:none;transition:border-color .15s}
.linput:focus{border-color:var(--rp)}
.lsend{width:30px;height:30px;background:var(--rp);color:#fff;border:none;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.tdots{display:flex;gap:4px;padding:5px 2px}
.tdot{width:6px;height:6px;border-radius:50%;background:var(--gd);animation:bnc 1.4s infinite}
.tdot:nth-child(2){animation-delay:.2s}.tdot:nth-child(3){animation-delay:.4s}
@keyframes bnc{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--gm);border-radius:3px}
.panim{animation:fu .2s ease}@keyframes fu{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fw6{font-weight:600}.fs11{font-size:11px}.fs12{font-size:12px}
/* Breadcrumb */
.breadcrumb{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--gd);margin-bottom:16px}
.breadcrumb a{color:var(--rp);text-decoration:none;font-weight:500;cursor:pointer}
.breadcrumb a:hover{text-decoration:underline}
/* Investigation cards */
.ccase{background:#fff;border:1px solid var(--gll);border-left:3px solid;border-radius:var(--br);padding:14px;margin-bottom:10px;cursor:pointer;transition:box-shadow .15s}
.ccase:hover{box-shadow:0 2px 8px rgba(0,0,0,.08)}
.ccase.cr{border-left-color:var(--red)}.ccase.wa{border-left-color:var(--yel)}
.fc{display:inline-flex;align-items:center;padding:4px 12px;border:1px solid var(--gm);border-radius:2px;font-size:12px;font-weight:500;color:var(--rp-black);cursor:pointer;user-select:none;transition:all .1s;background:#fff}
.fc:hover{border-color:var(--rp);color:var(--rp)}.fc.on{background:var(--rp);color:#fff;border-color:var(--rp)}
/* Vendor split bar */

const DonutChart = ({segs,size=160,thick=26,center}) => {
  const cx=size/2,cy=size/2,r=size/2-thick/2;
  const toXY=(deg)=>{const rad=(deg-90)*Math.PI/180;return{x:cx+r*Math.cos(rad),y:cy+r*Math.sin(rad)};};
  let start=0;
  const arcs=segs.map(seg=>{const sw=(seg.pct/100)*359.99;const s=toXY(start);const e=toXY(start+sw);const d=`M ${s.x} ${s.y} A ${r} ${r} 0 ${sw>180?1:0} 1 ${e.x} ${e.y}`;start+=sw;return {...seg,d};});
  return (
    <svg width={size} height={size}>
      <circle cx={cx} cy={cy} r={r} fill="none" stroke="var(--gll)" strokeWidth={thick}/>
      {arcs.map((a,i)=><path key={i} d={a.d} fill="none" stroke={a.color} strokeWidth={thick} strokeLinecap="butt"/>)}
      {center&&<text x={cx} y={cy-8} textAnchor="middle" fontSize={24} fontWeight={700} fill="var(--rp-black)">{center.val}</text>}
      {center&&<text x={cx} y={cy+10} textAnchor="middle" fontSize={10} fill="var(--gd)">{center.label}</text>}
    </svg>
  );
};

const LineChart = ({series,lbls,w=380,h=160,colors=['var(--ch3)','var(--orange)'],showDots=true,showArea=false,dashed=[]}) => {
  const all=series.flat();
  const mn=Math.min(...all)-5,mx=Math.max(...all)+5,rng=mx-mn||1;
  const pl={t:12,r:12,b:24,l:34};
  const cw=w-pl.l-pl.r,ch=h-pl.t-pl.b;
  const px=(v,i,len)=>pl.l+(i/Math.max(len-1,1))*cw;
  const py=(v)=>pl.t+ch-((v-mn)/rng)*ch;
  const mkPath=(s)=>s.map((v,i)=>`${i===0?'M':'L'} ${px(v,i,s.length)} ${py(v)}`).join(' ');
  return (
    <svg width={w} height={h} style={{overflow:'visible'}}>
      {[0,20,40,60,80,100].map(v=>{const y=py(v);return (y>=pl.t&&y<=pl.t+ch)?<g key={v}><line x1={pl.l} y1={y} x2={pl.l+cw} y2={y} stroke="var(--gll)" strokeWidth={1}/><text x={pl.l-6} y={y+3} textAnchor="end" fontSize={9} fill="var(--gd)">{v}</text></g>:null;})}
      {series.map((s,i)=>(
        <g key={i}>
          {showArea&&i===0&&<path d={`${mkPath(s)} L ${px(0,s.length-1,s.length)} ${pl.t+ch} L ${pl.l} ${pl.t+ch} Z`} fill={colors[i]} opacity={0.08}/>}
          <path d={mkPath(s)} fill="none" stroke={colors[i]||'var(--ch3)'} strokeWidth={2} strokeLinecap="round" strokeLinejoin="round" strokeDasharray={dashed[i]?'6,4':'none'}/>
          {showDots&&!dashed[i]&&s.map((v,j)=><circle key={j} cx={px(v,j,s.length)} cy={py(v)} r={3} fill={colors[i]||'var(--ch3)'}/>)}
        </g>
      ))}
      {lbls&&lbls.map((l,i)=><text key={i} x={pl.l+(i/Math.max(lbls.length-1,1))*cw} y={h-4} textAnchor="middle" fontSize={9} fill="var(--gd)">{l}</text>)}
    </svg>
  );
};

const MiniSparkLine = ({data,color='var(--ch3)',h=24,w=60}) => {
  const mn=Math.min(...data),mx=Math.max(...data),rng=mx-mn||1;
  const pts = data.map((v,i)=>`${(i/(data.length-1))*w},${h-((v-mn)/rng)*h}`).join(' ');
  return (
    <svg width={w} height={h} style={{overflow:'visible'}}>
      <polyline points={pts} fill="none" stroke={color} strokeWidth={1.5} strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  );
};

            {filtered.map(c=>(
              <div key={c.id} className={`ccase ${c.pri}`} onClick={()=>setSel(sel&&sel.id===c.id?null:c)}>
                <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
                  <span style={{fontSize:10,fontWeight:700,color:'var(--gd)'}}>{c.id}</span>
                  <span className={`tag ${c.pri==='cr'?'r':'y'}`}>{c.pri==='cr'?'Critical':'Warning'}</span>
                  <span className="tag gr">{c.status==='open'?'Open':'In Review'}</span>
                  <span style={{marginLeft:'auto',fontSize:10,color:'var(--gd)'}}>{c.age}d ago</span>
                </div>
                <div style={{fontSize:13,fontWeight:600,marginBottom:4}}>{c.type}</div>
                <div style={{display:'flex',gap:12,fontSize:11,color:'var(--gd)'}}>
                  <span>{c.prop}</span><span>{fmtK(c.amt)}</span>
                </div>
              </div>
            ))}
          </div>
          <div>
            {sel?(
              <div className="card" style={{position:'sticky',top:8}}>
                <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12}}>
                  <span style={{fontSize:11,fontWeight:700,color:'var(--gd)'}}>{sel.id}</span>
                  <span className={`tag ${sel.pri==='cr'?'r':'y'}`}>{sel.pri==='cr'?'Critical':'Warning'}</span>
                  <button className="btn bg xs" style={{marginLeft:'auto'}} onClick={()=>setSel(null)}>Close</button>
                </div>
                <div style={{fontSize:15,fontWeight:600,marginBottom:4}}>{sel.type}</div>
                <div style={{display:'flex',gap:10,fontSize:11,color:'var(--gd)',marginBottom:12}}>
                  <span>{sel.prop}</span><span>·</span><span style={{color:'var(--red)',fontWeight:600}}>{fmtK(sel.amt)}</span>
                </div>
                <div style={{background:'var(--gl)',border:'1px solid var(--gll)',borderRadius:'var(--br)',padding:16,marginBottom:14}}>
                  <div style={{fontSize:10,fontWeight:600,color:'var(--gd)',marginBottom:4}}>AI INVESTIGATION SUMMARY</div>
                  <div style={{fontSize:12,lineHeight:1.6}}>{sel.desc}</div>
                </div>
                <div style={{marginBottom:14}}>
                  <div style={{fontSize:11,fontWeight:600,color:'var(--gd)',marginBottom:8}}>RECOMMENDED ACTIONS</div>
                  {sel.actions.map((a,i)=>(
                    <div key={i} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 0',borderBottom:'1px solid var(--gll)'}}>
                      <div className="aq-num">{i+1}</div>
                      <div style={{flex:1,fontSize:12}}>{a}</div>
                      <button className="btn bp xs">Act</button>
                    </div>
                  ))}
                </div>
                <div style={{display:'flex',gap:8}}>
                  <button className="btn bp sm" style={{flex:1}}>Assign Case</button>
                  <button className="btn bs sm" style={{flex:1}}>Mark Resolved</button>
                </div>
              </div>
            ):(
              <div style={{background:'#fff',border:'1px solid var(--gll)',borderRadius:'var(--br)',padding:32,textAlign:'center',color:'var(--gd)'}}>
                <Icon n="eye" s={32} c="var(--gll)"/>
                <div style={{marginTop:8,fontSize:12}}>Select a case to view details</div>
              </div>
            )}
          </div>
        </div>
      </div>
    </div>
  );
};

/* ══════════════════════════════════════════════════════════════
   LUMINA AI PANEL
   ══════════════════════════════════════════════════════════════ */
const LuminaPanel = ({open,onClose}) => {
  const initMsg = {type:'ai',text:'Hi! I\'m Lumina, your spend analyst. Your portfolio has $26.6M in total spend with 70% compliance rate. Here\'s what I see:\n\n• Maverick spend at $6.2M (23%) — HVAC is the top driver\n• 187 of 261 vendors still offline (72%)\n• 3 vendors are ready for eInvoice activation — zero cost\n• Potential savings of $1.4M identified\n\nWhat would you like to explore?',time:'Now',rows:[{l:'Total Spend',v:'$26.6M',t:'g'},{l:'Maverick Spend',v:'$6.2M (23%)',t:'r'},{l:'Potential Savings',v:'$1.4M identified',t:'g'},{l:'Quick Win',v:'3 vendors ready',t:'g'}]};
  const [msgs,setMsgs] = useState([initMsg]);
  const [inp,setInp] = useState('');
  const [typing,setTyping] = useState(false);
  const endRef = useRef(null);
  useEffect(()=>{endRef.current?.scrollIntoView({behavior:'smooth'})},[msgs,typing]);
  const CHIPS = ['Show maverick spend by category','Which vendors are non-compliant?','Budget compliance status','How to reduce offline rate?'];
  const getResp = (q) => {
    const ql = q.toLowerCase();
    if (ql.includes('maverick')||ql.includes('hvac')||ql.includes('category')) return LUMINA_RESP.maverick;
    if (ql.includes('vendor')||ql.includes('non-compliant')||ql.includes('coi')) return LUMINA_RESP.vendors;
    if (ql.includes('offline')||ql.includes('leak')) return LUMINA_RESP.offline;
    if (ql.includes('budget')||ql.includes('over')) return LUMINA_RESP.budget;
    return LUMINA_RESP.default;
  };
  const send = (text) => {
    const q=(text||inp).trim();
    if (!q) return;
    setMsgs(m=>[...m,{type:'user',text:q,time:'Now'}]);
    setInp('');
    setTyping(true);
    setTimeout(()=>{
      const resp=getResp(q);
      setTyping(false);
      setMsgs(m=>[...m,{type:'ai',text:resp.text,time:'Now',rows:resp.rows}]);
    },1200);
  };
  const tagColor = (t)=>t==='r'?'var(--red)':t==='g'?'var(--green)':t==='w'?'var(--yel)':'var(--rp)';
  return (
    <div className={`lp ${open?'open':''}`}>
      <div className="lp-hdr">
        <div className="lp-ic"><SparkleIcon s={16} c="#fff"/></div>
        <div><div className="lp-t">Lumina AI</div><div className="lp-s">Spend Intelligence Agent</div></div>
        <div className="lp-cl" onClick={onClose}><svg width={16} height={16} viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth={2} strokeLinecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg></div>
      </div>
      <div className="lp-msgs">
        {msgs.map((m,i)=>(
          <div key={i} className={`lm ${m.type}`}>
            <div className="lb">
              {m.text}
              {m.rows&&(<div className="ldc"><div className="ldc-t">SPEND SUMMARY</div>{m.rows.map((r,j)=>(<div key={j} className="ldr"><span style={{color:'var(--rp-black)',opacity:0.7}}>{r.l}</span><span className="dv" style={{color:tagColor(r.t)}}>{r.v}</span></div>))}</div>)}
            </div>
            <div className="lt">{m.time}</div>
          </div>
        ))}
        {typing&&<div className="lm ai"><div className="lb"><div className="tdots"><div className="tdot"/><div className="tdot"/><div className="tdot"/></div></div></div>}
        <div ref={endRef}/>
      </div>
      <div className="lp-chips">{CHIPS.map((c,i)=><div key={i} className="lchip" onClick={()=>send(c)}>{c}</div>)}</div>
      <div className="lp-inp">
        <input className="linput" placeholder="Ask Lumina anything..." value={inp} onChange={e=>setInp(e.target.value)} onKeyDown={e=>e.key==='Enter'&&send()}/>
        <button className="lsend" onClick={()=>send()}><svg width={14} height={14} viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth={2} strokeLinecap="round" strokeLinejoin="round"><path d="M22 2L11 13M22 2L15 22 11 13 2 9l20-7z"/></svg></button>
      </div>
    </div>
  );
};

/* ══════════════════════════════════════════════════════════════
   OMNIBAR
   ══════════════════════════════════════════════════════════════ */
const Omnibar = ({aiOpen,onAI,onMenu}) => (
  <div className="omnibar">
    <div className="ob-ham" onClick={onMenu}><svg width={18} height={18} viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth={2} strokeLinecap="round"><path d="M3 12h18M3 6h18M3 18h18"/></svg></div>
    <div className="ob-dots"><span/><span/><span/></div>
    <div className="ob-brand">
      <div className="ob-brand-name">Spend Management</div>
      <div className="ob-brand-ctx">Acme Management Co | Meadow Bay</div>
    </div>
    <div className="ob-search">
      <svg width={14} height={14} viewBox="0 0 24 24" fill="none" stroke="rgba(32,39,55,.4)" strokeWidth={2} strokeLinecap="round"><circle cx={11} cy={11} r={8}/><path d="M21 21l-4.35-4.35"/></svg>
      <input placeholder="Search"/>
    </div>
    <div className="ob-acts">
      {[['cart',false],['grid',false],['bell',true],['help',false]].map(([ic,dot],i)=>(
        <button key={i} className="ob-ib"><Icon n={ic} s={16} c="rgba(255,255,255,.7)"/>{dot&&<div className="ob-dot"/>}</button>
      ))}
    </div>
    <div className="ob-user">
      <div className="ob-user-info"><div className="ob-user-name">John Smith</div><div className="ob-user-role">Leasing Agent</div></div>
      <div className="ob-av">JS</div>
    </div>
    <button className={`lumina-btn ${aiOpen?'active':''}`} onClick={onAI}>
      <SparkleIcon s={13} c="#fff"/>
      Ask Lumina AI
    </button>
  </div>
);

/* ══════════════════════════════════════════════════════════════
   SIDENAV — Matching Figma left panel
   ══════════════════════════════════════════════════════════════ */
const SideNav = ({page,onPage,col}) => {
  const [expanded,setExpanded] = useState({spend:true});
  const spendPages = ['compliance','category','property','budget','vendor','catDetail','propDetail','regDetail'];
  const isSpendActive = spendPages.some(p => page.startsWith(p) || page === p);

  return (
    <div className={`sidenav ${col?'col':''}`}>
      {/* Top section */}
      <div className={`nav-item ${page==='today'?'active':''}`} onClick={()=>onPage('today')}>
        <Icon n="grid" s={16}/><span>Today</span>
      </div>
      <div className={`nav-item ${page==='spendai'?'active':''}`} onClick={()=>{onPage('compliance');setExpanded(e=>({...e,spend:!e.spend}))}}>
        <svg width={16} height={16} viewBox="0 0 24 24" fill="none" stroke={isSpendActive?'var(--rp)':'currentColor'} strokeWidth={1.5} strokeLinecap="round"><path d="M12 0L14.59 8.41L23 11L14.59 13.59L12 22L9.41 13.59L1 11L9.41 8.41L12 0Z" fill={isSpendActive?'var(--rp)':'none'}/></svg>
        <span style={{color:isSpendActive?'var(--rp)':'inherit',fontWeight:isSpendActive?600:500}}>Spend AI</span>
        <span className={`nav-chev ${expanded.spend?'up':''}`}><svg width={12} height={12} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={2}><path d="M6 9l6 6 6-6"/></svg></span>
      </div>
      {expanded.spend&&(
        <>
          <div className={`nav-sub ${page==='compliance'?'active':''}`} onClick={()=>onPage('compliance')}>Spend Compliance</div>
          <div className="nav-sub" style={{color:'var(--gd)',fontSize:12,paddingLeft:54,height:32,fontWeight:400}}>Contract Compliance</div>
        </>
      )}
      <div className="sn-divider"/>
      {[
        {id:'storefront',icon:'cart',label:'Storefront'},
        {id:'orders',icon:'file',label:'Orders'},
        {id:'invoices',icon:'layers',label:'Invoices'},
        {id:'approvals',icon:'check',label:'Approvals'},
      ].map(item=>(
        <div key={item.id} className={`nav-item ${page===item.id?'active':''}`} onClick={()=>onPage(item.id)}>
          <Icon n={item.icon} s={16}/><span>{item.label}</span>
        </div>
      ))}
      <div className="sn-divider"/>
      {[
        {id:'vendors',icon:'user',label:'Vendors'},
        {id:'setup',icon:'grid',label:'Setup'},
        {id:'payments',icon:'link',label:'Payments'},
        {id:'report',icon:'file',label:'Report'},
        {id:'helpnav',icon:'help',label:'Help'},
      ].map(item=>(
        <div key={item.id} className={`nav-item ${page===item.id?'active':''}`} onClick={()=>onPage(item.id)}>
          <Icon n={item.icon} s={16}/><span>{item.label}</span>
        </div>
      ))}
      <div className="sn-bot">
        <div className="sn-user">
          <div className="uav">JS</div>
          <span><div style={{fontSize:12,fontWeight:500}}>John Smith</div><div style={{fontSize:10,color:'var(--gd)'}}>Leasing Agent</div></span>
        </div>
      </div>
    </div>
  );
};

/* ══════════════════════════════════════════════════════════════
   SPEND COMPLIANCE WRAPPER — Page header + sub-navigation
   ══════════════════════════════════════════════════════════════ */
const SpendCompliancePage = ({activeView,onNavigate,detailName}) => {
  return (
    <div className="panim">
      {/* Page Header */}
      <div className="ph-strip">
        <div>
          <div className="ph-eyebrow"><span className="ph-dot or"/><span className="ph-dot gr"/></div>
          <div className="ph-title">Spend Compliance</div>
          <div className="ph-sub">Portfolio-wide spend compliance overview for procurement, finance, and operations leadership</div>
        </div>
        <div style={{display:'flex',gap:8}}>
          <button className="btn bg sm"><Icon n="export" s={13}/> Export</button>
        </div>
      </div>

      {/* Sub-navigation tabs */}
      <div style={{background:'#fff',borderBottom:'2px solid var(--gll)',padding:'0 40px'}}>
        <div className="tabs" style={{borderBottom:'none',marginBottom:0}}>
          {[
            {id:'compliance',label:'Spend Overview'},
            {id:'category',label:'Category'},
            {id:'property',label:'Property'},
            {id:'budget',label:'Budget Compliance'},
            {id:'vendor',label:'Vendor'},
          ].map(t => (
            <div key={t.id} className={`tab ${activeView===t.id||(activeView==='catDetail'&&t.id==='category')||(activeView==='propDetail'&&t.id==='property')?'on':''}`} onClick={()=>onNavigate(t.id)}>
              {t.label}
            </div>
          ))}
        </div>
      </div>

      <FilterBar/>

      {/* Render active view */}
      {activeView==='compliance' && <SpendOverview onNavigate={onNavigate}/>}
      {(activeView==='category'||activeView==='catDetail') && <CategoryDrilldown onNavigate={onNavigate} detailName={activeView==='catDetail'?detailName:null}/>}
      {(activeView==='property'||activeView==='propDetail'||activeView==='regDetail') && <PropertyDrilldown onNavigate={onNavigate} detailName={(activeView==='propDetail'||activeView==='regDetail')?detailName:null}/>}
      {activeView==='budget' && <BudgetCompliance onNavigate={onNavigate}/>}
      {activeView==='vendor' && <VendorDrilldown onNavigate={onNavigate}/>}
    </div>
  );
};

/* ══════════════════════════════════════════════════════════════
   APP — Root component
   ══════════════════════════════════════════════════════════════ */
const App = () => {
  const [page,setPage] = useState('compliance');
  const [aiOpen,setAiOpen] = useState(false);
  const [navCol,setNavCol] = useState(false);
  const [detailName,setDetailName] = useState(null);

  const handleNavigate = (target,name) => {
    if (target === 'catDetail') {
      setPage('catDetail');
      setDetailName(name);
    } else if (target === 'propDetail') {
      setPage('propDetail');
      setDetailName(name);
    } else if (target === 'regDetail') {
      setPage('propDetail');
      setDetailName(name);
    } else {
      setPage(target);
      if (!name) setDetailName(null);
    }
    // Scroll to top
    const mainEl = document.querySelector('.main');
    if (mainEl) mainEl.scrollTop = 0;
  };

  const getActiveView = () => {
    const spendViews = ['compliance','category','catDetail','property','propDetail','regDetail','budget','vendor'];
    if (spendViews.includes(page)) return page;
    return null;
  };

  const renderPage = () => {
    const activeView = getActiveView();
    if (activeView) {
      return <SpendCompliancePage activeView={activeView} onNavigate={handleNavigate} detailName={detailName}/>;
    }
    if (page === 'investigations') return <Investigations onNavigate={handleNavigate}/>;
    // Default: show spend compliance
    return <SpendCompliancePage activeView="compliance" onNavigate={handleNavigate} detailName={null}/>;
  };

  return (
    <>
      <Omnibar aiOpen={aiOpen} onAI={()=>setAiOpen(o=>!o)} onMenu={()=>setNavCol(c=>!c)}/>
      <div className="app-shell">
        <SideNav page={page} onPage={handleNavigate} col={navCol}/>
        <div className={`main ${aiOpen?'aio':''}`}>{renderPage()}</div>
      </div>
      <LuminaPanel open={aiOpen} onClose={()=>setAiOpen(false)}/>
    </>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
